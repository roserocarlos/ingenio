# =============================================================================
# Ingenio+ — Mosquitto configuración Plan Raíz
# Con autenticación — diferencia clave vs MING original (anónimo)
# =============================================================================

listener 1883
protocol mqtt

# WebSocket — necesario para que el dashboard (MQTT.js) se conecte desde el navegador
listener 9001
protocol websockets

# Autenticación obligatoria — sin acceso anónimo
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
