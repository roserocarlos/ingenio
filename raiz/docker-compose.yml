version: "3.8"

# =============================================================================
# Ingenio+ — Plan Raíz (Arduino UNO Q 4GB)
# Basado en arquitectura validada MING Stack (roserocarlos/Ming)
# Adaptado para producción en campo — Plan Raíz 5-20 ha
#
# Diferencias vs MING original:
#   - Mosquitto con autenticación (no anónimo)
#   - Todas las credenciales en .env (no hardcodeadas)
#   - Nombres genéricos ingenio_* (no ming_*)
#   - Bucket "sensores" + topics ingenio/{finca}/{node}/up
#     (mismo esquema que Plan Cosecha — consistencia entre planes)
#   - NODE_RED_CREDENTIAL_SECRET fijo (evita el bug de flows_cred.json)
#   - Nginx sirviendo el dashboard v3 + proxy InfluxDB (no exposición directa)
#   - Home Assistant integrado en la misma red Docker
#
# Deploy:
#   git clone https://github.com/roserocarlos/ingenio
#   cd ingenio/raiz
#   cp .env.example .env
#   docker compose up -d
# =============================================================================

services:

  # ───────────────────────────────────────────────────────────────────────────
  # MOSQUITTO — Broker MQTT con autenticación
  # ───────────────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: ingenio_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"   # WebSocket — necesario para el dashboard (MQTT.js)
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - ingenio_net

  # ───────────────────────────────────────────────────────────────────────────
  # INFLUXDB 2.x — Historial series temporales
  # ───────────────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: ingenio_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - ingenio_net

  # ───────────────────────────────────────────────────────────────────────────
  # NODE-RED — Transformación de datos + alertas + control actuador
  # ───────────────────────────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: ingenio_nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=America/Bogota
      # Fix crítico: secreto fijo evita pérdida de credenciales entre
      # reimports de flujos (bug documentado en MING)
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET}
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - ingenio_net

  # ───────────────────────────────────────────────────────────────────────────
  # NGINX — Portal cliente (dashboard v3) + proxy InfluxDB
  # ───────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ingenio_nginx
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - influxdb
      - mosquitto
    networks:
      - ingenio_net

  # ───────────────────────────────────────────────────────────────────────────
  # GRAFANA — Panel admin técnico (no para el agricultor)
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ingenio_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - ingenio_net

  # ───────────────────────────────────────────────────────────────────────────
  # HOME ASSISTANT — Automatizaciones locales offline
  # Modo host: necesario para discovery de dispositivos en red local
  # (mDNS, SSDP) — por eso no usa ingenio_net como los demás servicios
  # ───────────────────────────────────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ingenio_homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - TZ=America/Bogota
    volumes:
      - ./homeassistant/config:/config

# ───────────────────────────────────────────────────────────────────────────
# VOLÚMENES PERSISTENTES
# ───────────────────────────────────────────────────────────────────────────
volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  influxdb_config:
  nodered_data:
  grafana_data:

# ───────────────────────────────────────────────────────────────────────────
# RED INTERNA
# ───────────────────────────────────────────────────────────────────────────
networks:
  ingenio_net:
    driver: bridge
