# =============================================================================
# Ingenio+ — Nginx Plan Raíz
# Sirve el portal cliente (dashboard v3, mismo que Plan Cosecha)
# Proxy InfluxDB — resuelve CORS sin exponer token al navegador
# Sin OpenRemote — Plan Raíz lee directo de InfluxDB y Mosquitto WS
# =============================================================================

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        # Portal cliente — dashboard v3 (mismo HTML que Plan Cosecha)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Proxy InfluxDB — token inyectado server-side
        location /api/historial {
            proxy_pass http://influxdb:8086/api/v2/query;
            proxy_set_header Authorization "Token INFLUXDB_TOKEN_PLACEHOLDER";
            proxy_set_header Content-Type "application/vnd.flux";
            proxy_set_header Accept "application/csv";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            if ($request_method = OPTIONS) { return 204; }
        }
    }
}
