# =============================================================================
# Ingenio+ — Stack completo v11 (Plan Cosecha)
# Mini PC N2840 + WM1302 USB + ChirpStack v4
# Verificado en Debian 13 — http://ingenioplus.local/manager/ ✅
#
# FLUJO DE DATOS LoRaWAN (Plan Cosecha):
#   WM1302 USB → lora_pkt_fwd (host) → UDP:1700
#     → chirpstack-gateway-bridge → EMQX (topics us915_0/gateway/...)
#       → chirpstack → EMQX (topics chirpstack/application/.../event/up)
#         → Node-RED → InfluxDB + OpenRemote
#
# FLUJO DE DATOS LoRa P2P (Plan Semilla/Raíz):
#   Nodo → LoRa P2P → Receptor ESP32-S3 → MQTT → EMQX
#     → OpenRemote MQTT Agent + Node-RED → InfluxDB
#
# Accesos locales (mDNS):
#   OpenRemote:  http://ingenioplus.local/manager/
#   ChirpStack:  http://ingenioplus.local:8090
#   Grafana:     http://ingenioplus.local:3000
#   EMQX:        http://ingenioplus.local:18083
#   InfluxDB:    http://ingenioplus.local:8086
#   Node-RED:    http://ingenioplus.local:1880
#   Portal:      http://ingenioplus.local:8087
#   Portainer:   http://ingenioplus.local:9000
# =============================================================================

services:

  # ── 1. EMQX — Hub MQTT central ────────────────────────────────────────────
  # Recibe: datos LoRa P2P del receptor ESP32-S3
  #         datos LoRaWAN del ChirpStack Gateway Bridge
  #         datos procesados de ChirpStack
  emqx:
    image: emqx/emqx:6.1.1
    container_name: emqx
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_NODE__NAME: "emqx@127.0.0.1"
      EMQX_DASHBOARD__DEFAULT_USERNAME: "${EMQX_DASHBOARD_USER}"
      EMQX_DASHBOARD__DEFAULT_PASSWORD: "${EMQX_DASHBOARD_PASSWORD}"
      EMQX_MQTT__MAX_TOPIC_LEVELS: "10"
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_LISTENERS__WS__DEFAULT__MQTT_PATH: "/mqtt"
    volumes:
      - ./emqx/data:/opt/emqx/data
      - ./emqx/log:/opt/emqx/log
    healthcheck:
      disable: true

  # ── 2. PostgreSQL OpenRemote ───────────────────────────────────────────────
  # alias "postgresql" — Keycloak lo busca por ese nombre
  # UID 70 — imagen openremote/postgresql
  openremote-postgres:
    image: openremote/postgresql:latest
    container_name: openremote-postgres
    restart: unless-stopped
    networks:
      apps:
        aliases:
          - postgresql
    volumes:
      - ./openremote/data/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openremote"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 3. Keycloak ───────────────────────────────────────────────────────────
  # alias "keycloak" — OpenRemote Manager lo busca por ese nombre
  # KC_HOSTNAME_URL fuerza HTTP para modo local
  openremote-keycloak:
    image: openremote/keycloak:latest
    container_name: openremote-keycloak
    restart: unless-stopped
    networks:
      apps:
        aliases:
          - keycloak
    ports:
      - "8093:8080"
    depends_on:
      openremote-postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
    environment:
      KEYCLOAK_ADMIN_PASSWORD: "${OR_ADMIN_PASSWORD}"
      KC_HOSTNAME: "${OR_HOSTNAME}"
      KC_HTTP_PORT: "8080"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: "edge"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_PROXY_HEADERS: "forwarded"
      KC_HOSTNAME_URL: "http://${OR_HOSTNAME}/auth"
      KC_HOSTNAME_ADMIN_URL: "http://${OR_HOSTNAME}/auth"
    healthcheck:
      disable: true

  # ── 4. OpenRemote Manager ─────────────────────────────────────────────────
  openremote-manager:
    image: openremote/manager:latest
    container_name: openremote-manager
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "8091:8080"
    depends_on:
      openremote-postgres:
        condition: service_healthy
      openremote-keycloak:
        condition: service_started
      emqx:
        condition: service_started
    environment:
      OR_HOSTNAME: "${OR_HOSTNAME}"
      OR_SSL_PORT: "-1"
      OR_DEV_MODE: "false"
      OR_EMAIL_ADMIN: "admin@ingenio.plus"
      OR_ADMIN_PASSWORD: "${OR_ADMIN_PASSWORD}"
      SETUP_WIPE_CLEAN_INSTALL: "false"
      OR_MQTT_BROKER_HOST: "emqx"
      OR_MQTT_BROKER_PORT: "1883"
    volumes:
      - ./openremote/data/manager:/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  # ── 5. InfluxDB v2 ────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: "setup"
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_ADMIN_USER}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET}"
      DOCKER_INFLUXDB_INIT_RETENTION: "${INFLUXDB_RETENTION}"
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 6. Node-RED ───────────────────────────────────────────────────────────
  # Procesa AMBOS flujos:
  #   - LoRa P2P: topics ingenio/{finca}/{node}/up
  #   - LoRaWAN:  topics chirpstack/application/{id}/device/{eui}/event/up
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "1880:1880"
    depends_on:
      influxdb:
        condition: service_healthy
      emqx:
        condition: service_started
    environment:
      TZ: "${TZ}"
      NODE_RED_CREDENTIAL_SECRET: "${NODE_RED_CREDENTIAL_SECRET}"
      INFLUX_URL: "http://influxdb:8086"
      INFLUX_TOKEN: "${INFLUXDB_TOKEN}"
      INFLUX_ORG: "${INFLUXDB_ORG}"
      INFLUX_BUCKET: "${INFLUXDB_BUCKET}"
      MQTT_BROKER: "emqx"
      MQTT_PORT: "1883"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      OFFLINE_THRESHOLD_MS: "600000"
    volumes:
      - ./nodered/data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1880 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 7. Grafana OSS ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: "${INFLUXDB_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "http://${OR_HOSTNAME}:3000"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: "warn"
      GF_PLUGINS_PREINSTALL: "yesoreyeram-infinity-datasource"
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 8. Nginx — proxy InfluxDB CORS + portal cliente ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "8087:80"
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    healthcheck:
      disable: true

  # ── 9. Caddy — proxy unificado :80 ────────────────────────────────────────
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      - nginx
      - emqx
    healthcheck:
      disable: true

  # ── 10. Portainer ─────────────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data

  # ══════════════════════════════════════════════════════════════════════════
  # CHIRPSTACK — Stack LoRaWAN (Plan Cosecha con WM1302 USB)
  # ══════════════════════════════════════════════════════════════════════════

  # ── 11. PostgreSQL ChirpStack ──────────────────────────────────────────────
  # Base de datos separada de OpenRemote para independencia
  chirpstack-postgres:
    image: postgres:14-alpine
    container_name: chirpstack-postgres
    restart: unless-stopped
    networks:
      - apps
    environment:
      POSTGRES_PASSWORD: chirpstack
    volumes:
      - ./chirpstack/configuration/postgresql/initdb:/docker-entrypoint-initdb.d:ro
      - ./chirpstack/data/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 12. Redis ChirpStack ───────────────────────────────────────────────────
  chirpstack-redis:
    image: redis:7-alpine
    container_name: chirpstack-redis
    restart: unless-stopped
    networks:
      apps:
        aliases:
          - chirpstack-redis
    volumes:
      - ./chirpstack/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 13. ChirpStack Network Server ─────────────────────────────────────────
  # UI accesible en: http://ingenioplus.local:8090
  # Credenciales por defecto: admin / admin (cambiar en primer acceso)
  chirpstack:
    image: chirpstack/chirpstack:4.9.0
    container_name: chirpstack
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "8090:8080"
    command: -c /etc/chirpstack
    depends_on:
      chirpstack-postgres:
        condition: service_healthy
      chirpstack-redis:
        condition: service_healthy
      emqx:
        condition: service_started
    environment:
      MQTT_BROKER_HOST: "emqx"
      REDIS_HOST: "chirpstack-redis"
      POSTGRESQL_HOST: "chirpstack-postgres"
    volumes:
      - ./chirpstack/configuration/chirpstack:/etc/chirpstack:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 14. ChirpStack Gateway Bridge US915 ───────────────────────────────────
  # Escucha UDP:1700 — el packet_forwarder del WM1302 envía aquí
  # Convierte protocolo Semtech UDP → MQTT en EMQX
  # Región: US915_0 (Colombia 915MHz)
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    container_name: chirpstack-gateway-bridge
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "1700:1700/udp"
    depends_on:
      emqx:
        condition: service_started
    environment:
      INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE: "us915_0/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
      INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE: "us915_0/gateway/{{ .GatewayID }}/state/{{ .StateType }}"
      INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE: "us915_0/gateway/{{ .GatewayID }}/command/#"
      INTEGRATION__MQTT__AUTH__GENERIC__SERVERS: "tcp://emqx:1883"
    volumes:
      - ./chirpstack/configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro

networks:
  apps:
    external: true
