<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F2028">
<title>Ingenio+ | Mi Finca</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   TOKENS Ingenio+
═══════════════════════════════════════════════ */
:root{
  --c1:#1F5F66;--c2:#E8742A;--c3:#214F57;--c4:#1FA187;--c5:#27B1A0;
  --c6:#D83C7C;--c7:#E33C84;--c8:#F4D74E;
  --dark:#0F2028;--dark2:#162A34;--dark3:#1a2d38;
  --bg:#F5F2EC;--bg2:#EDE9E1;--surf:#fff;--surf2:#EEF7F5;
  --ink:#0F2028;--muted:#4A6870;--faint:#90AEB8;
  --on-dark:#E8F0F2;--muted-dark:#7AACB6;
  --line:rgba(15,32,40,.08);--line2:rgba(15,32,40,.14);
  --f-d:'Fraunces',Georgia,serif;--f-b:'DM Sans',system-ui,sans-serif;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--pill:999px;
  --sh:0 4px 20px rgba(15,32,40,.10);--sh-lg:0 12px 40px rgba(15,32,40,.16);
  --ease:cubic-bezier(.22,.68,0,1.18);
  --tab-h:60px;
  --top-h:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{height:100%;font-family:var(--f-b);font-weight:300;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* ═══ ANIMATIONS ═══ */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes slideRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes loadbar{from{width:0}to{width:100%}}

/* ═══ LOADING ═══ */
.loading-overlay{position:fixed;inset:0;background:var(--dark2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s var(--ease)}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:var(--f-d);font-size:56px;font-weight:900;letter-spacing:-2.5px;display:flex;margin-bottom:8px}
.loading-logo span:nth-child(1){color:#1F5F66}.loading-logo span:nth-child(2){color:#E8742A}
.loading-logo span:nth-child(3){color:#214F57}.loading-logo span:nth-child(4){color:#1FA187}
.loading-logo span:nth-child(5){color:#27B1A0}.loading-logo span:nth-child(6){color:#D83C7C}
.loading-logo span:nth-child(7){color:#E33C84}.loading-logo span:nth-child(8){color:#F4D74E}
.loading-tagline{font-family:var(--f-d);font-style:italic;font-size:14px;color:var(--muted-dark);margin-bottom:28px}
.loading-msg{font-size:12px;color:var(--muted-dark);margin-bottom:16px}
.loading-bar{width:180px;height:2px;background:rgba(255,255,255,.08);border-radius:var(--pill);overflow:hidden}
.loading-fill{height:100%;background:var(--c4);border-radius:var(--pill);animation:loadbar 2.5s var(--ease) forwards}

/* ═══ TOPBAR (compartida desktop+mobile) ═══ */
.topbar{height:var(--top-h);background:var(--dark2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.06);position:relative;z-index:100}
.logo{font-family:var(--f-d);font-size:24px;font-weight:900;letter-spacing:-1px;display:flex;user-select:none;flex-shrink:0}
.logo span:nth-child(1){color:#1F5F66}.logo span:nth-child(2){color:#E8742A}
.logo span:nth-child(3){color:#214F57}.logo span:nth-child(4){color:#1FA187}
.logo span:nth-child(5){color:#27B1A0}.logo span:nth-child(6){color:#D83C7C}
.logo span:nth-child(7){color:#E33C84}.logo span:nth-child(8){color:#F4D74E}
.farm-block{display:flex;flex-direction:column;align-items:center}
.farm-name{font-family:var(--f-d);font-size:15px;font-weight:600;color:#fff;letter-spacing:-.02em;line-height:1.1}
.farm-sub{font-size:10px;color:var(--muted-dark);margin-top:1px}
.top-r{display:flex;align-items:center;gap:8px}
.offline-badge{display:flex;align-items:center;gap:4px;background:rgba(31,161,135,.15);border:1px solid rgba(31,161,135,.3);border-radius:var(--pill);padding:3px 8px;font-size:10px;font-weight:600;color:var(--c5)}
.source-badge{font-size:10px;padding:3px 8px;border-radius:var(--pill);background:rgba(255,255,255,.07);color:var(--muted-dark)}
.source-badge.live{background:rgba(31,161,135,.2);color:var(--c5)}
.conn-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted-dark)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;transition:background .3s}
.conn-dot.on{background:#22c55e;animation:blink 2.5s infinite}
.health-bar{height:3px;background:var(--dark3);flex-shrink:0;display:flex;gap:1px}
.hb-seg{flex:1;transition:background .5s}

/* ═══════════════════════════════════════════════
   DESKTOP LAYOUT (≥768px)
═══════════════════════════════════════════════ */
.app{display:flex;height:calc(100vh - var(--top-h) - 3px)}
.sidebar{width:292px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--line2);display:flex;flex-direction:column;overflow:hidden}
.map-area{flex:1;position:relative}
#map{width:100%;height:100%}

/* Sidebar nav desktop */
.snav{display:flex;border-bottom:2px solid var(--line)}
.snav-btn{flex:1;padding:11px 4px;border:none;background:none;font-family:var(--f-b);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.snav-btn.active{color:var(--c3);border-bottom-color:var(--c4)}
.spanel{flex:1;overflow-y:auto;padding:10px}
.spanel::-webkit-scrollbar{width:3px}
.spanel::-webkit-scrollbar-thumb{background:var(--c5);border-radius:9px}

/* Health widget desktop */
.health-widget{margin:10px 10px 0;padding:12px 14px;background:var(--dark2);border-radius:var(--r16);display:flex;align-items:center;gap:12px}
.health-circle{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative}
.health-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.health-num{font-family:var(--f-d);font-size:20px;font-weight:700;color:#fff;line-height:1;position:relative;z-index:1}
.health-info{flex:1}
.health-label{font-size:11px;font-weight:600;margin-bottom:2px}
.health-label.good{color:#22c55e}.health-label.warn{color:var(--c8)}.health-label.crit{color:#ef4444}
.health-desc{font-size:10px;color:var(--muted-dark);line-height:1.4}

/* Detail panel desktop */
.detail-panel{position:absolute;top:14px;right:14px;width:296px;background:var(--surf);border-radius:var(--r20);box-shadow:var(--sh-lg);border:1.5px solid var(--line2);z-index:1000;max-height:calc(100vh - 88px);overflow-y:auto;display:none}
.detail-panel.show{display:block;animation:fadeUp .3s var(--ease) both}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--c5);border-radius:9px}
.dp-header{background:var(--dark2);border-radius:var(--r20) var(--r20) 0 0;padding:14px 16px}
.dp-close{float:right;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;line-height:22px;text-align:center;transition:background .15s}
.dp-close:hover{background:rgba(255,255,255,.22)}
.dp-name{font-family:var(--f-d);font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.dp-loc{font-size:11px;color:var(--muted-dark)}
.dp-body{padding:14px}

/* Bottom bar desktop */
.bottom-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(15,32,40,.9);backdrop-filter:blur(12px);padding:8px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.07);z-index:999}
.bb-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--on-dark)}
.bb-dot{width:6px;height:6px;border-radius:50%}
.bb-spacer{flex:1}
.bb-ts{font-size:10px;color:var(--muted-dark)}
.bb-offline{display:flex;align-items:center;gap:4px;background:rgba(31,161,135,.12);border:1px solid rgba(31,161,135,.25);border-radius:var(--pill);padding:2px 8px;font-size:10px;color:var(--c5);font-weight:500}

/* ═══════════════════════════════════════════════
   SENSOR CARDS (compartidas)
═══════════════════════════════════════════════ */
.sensor-card{background:var(--bg);border:1.5px solid var(--line2);border-radius:var(--r16);padding:11px;margin-bottom:7px;cursor:pointer;transition:all .2s var(--ease)}
.sensor-card:hover{border-color:var(--c5);transform:translateX(2px);box-shadow:var(--sh)}
.sensor-card.active{border-color:var(--c4);background:var(--surf2);box-shadow:var(--sh)}
.sc-top{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-online{background:#22c55e;animation:pulse 2.5s infinite}
.st-degraded{background:var(--c8);animation:blink 1.5s infinite}
.st-offline{background:#ef4444}
.sc-name{font-family:var(--f-d);font-size:13px;font-weight:600;color:var(--ink);flex:1;line-height:1.2}
.sc-time{font-size:10px;color:var(--faint);white-space:nowrap}
.sc-decision{font-size:11px;font-weight:600;margin-bottom:6px}
.sc-decision.si{color:var(--c2)}.sc-decision.revisar{color:#8A6200}.sc-decision.no{color:var(--c4)}
.kpi-mini{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.km{background:#fff;border-radius:var(--r8);padding:6px 8px;border:1px solid var(--line)}
.km-top{display:flex;align-items:baseline;gap:4px}
.km-v{font-family:var(--f-d);font-size:15px;font-weight:700;line-height:1;color:var(--c4)}
.km-trend{font-size:11px;font-weight:600}
.km-trend.up{color:#22c55e}.km-trend.down{color:#ef4444}.km-trend.flat{color:var(--faint)}
.km-l{font-size:9px;color:var(--muted);margin-top:2px}
.bat-row{display:flex;align-items:center;gap:6px}
.bat-bar{flex:1;height:3px;background:var(--line2);border-radius:var(--pill);overflow:hidden}
.bat-fill{height:100%;border-radius:var(--pill);transition:width .5s var(--ease)}
.bat-fill.high{background:linear-gradient(90deg,var(--c4),var(--c5))}.bat-fill.med{background:var(--c8)}.bat-fill.low{background:#ef4444}
.bat-val{font-size:10px;color:var(--muted);white-space:nowrap}
.bat-days{font-size:9px;color:var(--faint)}

/* ═══ ALERTAS ═══ */
.alert-item{display:flex;align-items:flex-start;gap:8px;background:var(--bg);border-radius:var(--r12);padding:9px 11px;margin-bottom:6px;border-left:3px solid var(--line2);animation:fadeUp .3s var(--ease) both}
.alert-item.ok{border-left-color:#22c55e}.alert-item.warn{border-left-color:var(--c8)}.alert-item.crit{border-left-color:#ef4444}
.al-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.al-msg{font-size:11px;color:var(--ink);line-height:1.45}
.al-time{font-size:10px;color:var(--faint);margin-top:2px}

/* ═══ DETAIL PANEL BODY (compartido) ═══ */
.dp-score{display:flex;align-items:center;gap:12px;background:var(--dark2);border-radius:var(--r12);padding:11px 14px;margin-bottom:12px}
.dp-score-num{font-family:var(--f-d);font-size:32px;font-weight:900;line-height:1}
.dp-score-num.good{color:#22c55e}.dp-score-num.warn{color:var(--c8)}.dp-score-num.crit{color:#ef4444}
.dp-score-info{flex:1}
.dp-score-label{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
.dp-score-sub{font-size:11px;color:var(--muted-dark);line-height:1.4}
.dp-kpis{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.dp-kpi{background:var(--bg);border-radius:var(--r12);padding:10px 11px;border:1px solid var(--line)}
.dp-kpi-top{display:flex;align-items:baseline;gap:5px;margin-bottom:2px}
.dp-val{font-family:var(--f-d);font-size:20px;font-weight:700;color:var(--c4);line-height:1}
.dp-trend{font-size:13px;font-weight:700}
.dp-trend.up{color:#22c55e}.dp-trend.down{color:#ef4444}.dp-trend.flat{color:var(--faint)}
.dp-lbl{font-size:10px;color:var(--muted)}
.dp-compare{font-size:10px;color:var(--faint);margin-top:3px}
.dp-riego{border-radius:var(--r12);padding:11px 13px;margin-bottom:12px;border:1.5px solid}
.dp-riego.si{background:rgba(232,116,42,.08);border-color:rgba(232,116,42,.3)}
.dp-riego.no{background:rgba(31,161,135,.07);border-color:rgba(31,161,135,.2)}
.dp-riego.revisar{background:rgba(244,215,78,.1);border-color:rgba(244,215,78,.35)}
.dp-riego-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.dp-riego.si .dp-riego-lbl{color:var(--c2)}.dp-riego.no .dp-riego-lbl{color:var(--c4)}.dp-riego.revisar .dp-riego-lbl{color:#8A6200}
.dp-riego-txt{font-size:13px;color:var(--ink);line-height:1.5;font-weight:400}
.dp-rec{background:rgba(31,161,135,.07);border:1.5px solid rgba(31,161,135,.18);border-radius:var(--r12);padding:10px 12px;margin-bottom:12px}
.dp-rec-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c4);margin-bottom:4px}
.dp-rec-txt{font-size:12px;color:var(--ink);line-height:1.5}
.chart-wrap{height:100px;margin-bottom:12px}
.chart-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:500}
.dp-hw{display:flex;gap:5px;flex-wrap:wrap}
.hw-tag{background:var(--bg);border:1px solid var(--line2);border-radius:var(--pill);padding:2px 8px;font-size:10px;color:var(--muted)}

/* ═══ ACTUADOR (compartido) ═══ */
.act-block{background:var(--dark2);border-radius:var(--r12);padding:12px 14px;margin-bottom:12px}
.act-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-dark);margin-bottom:10px}
.act-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.act-status{font-size:12px;color:var(--on-dark);flex:1;line-height:1.4}
.act-status small{display:block;font-size:10px;color:var(--muted-dark);margin-top:2px}
.btn-riego{padding:8px 16px;border-radius:var(--pill);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s var(--ease);white-space:nowrap;font-family:var(--f-b)}
.btn-riego.idle{background:var(--c4);color:#fff}.btn-riego.idle:hover{background:var(--c1);transform:scale(1.03)}
.btn-riego.pending{background:var(--c8);color:var(--dark);cursor:wait}
.btn-riego.active{background:#22c55e;color:#fff;cursor:default}
.btn-riego.error{background:#ef4444;color:#fff}
.btn-riego.off{background:rgba(255,255,255,.1);color:var(--muted-dark)}
.act-timer{font-family:var(--f-d);font-size:22px;font-weight:700;color:#22c55e;text-align:center;margin-top:8px;display:none}
.act-duration{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.dur-btn{padding:4px 10px;border-radius:var(--pill);font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:var(--muted-dark);cursor:pointer;transition:all .15s}
.dur-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.dur-btn.selected{background:var(--c4);color:#fff;border-color:var(--c4)}

/* ═══════════════════════════════════════════════
   MOBILE LAYOUT (<768px)
═══════════════════════════════════════════════ */
@media(max-width:767px){
  body{overflow:hidden}

  /* Topbar mobile — más compacto */
  .topbar{height:50px;padding:0 12px}
  .logo{font-size:20px}
  .farm-name{font-size:13px}
  .farm-sub{display:none}
  .offline-badge{display:none}
  .source-badge{font-size:9px;padding:2px 6px}

  /* App mobile — columna, espacio para tab bar */
  .app{display:flex;flex-direction:column;height:calc(100vh - 53px - var(--tab-h));overflow:hidden}

  /* Sidebar mobile — oculta por defecto, tabs la muestran */
  .sidebar{width:100%;height:100%;flex-shrink:0;display:none;flex-direction:column;overflow:hidden}
  .sidebar.active{display:flex}

  /* Mapa mobile — ocupa todo cuando está activo */
  .map-area{flex:1;position:relative;display:none}
  .map-area.active{display:block}

  /* Detail panel mobile — pantalla completa */
  .detail-panel{position:fixed;inset:0;bottom:var(--tab-h);width:100%;max-height:calc(100vh - 53px - var(--tab-h));border-radius:0;box-shadow:none;border:none;animation:slideRight .25s var(--ease) both}
  .detail-panel .dp-header{border-radius:0}
  .dp-close{position:sticky;float:none;display:inline-flex;align-items:center;justify-content:center}

  /* Tab bar mobile */
  .tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--dark2);border-top:1px solid rgba(255,255,255,.08);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:0;transition:all .15s}
  .tab-btn svg{width:22px;height:22px;stroke:var(--muted-dark);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
  .tab-btn span{font-size:10px;font-weight:500;color:var(--muted-dark);transition:color .15s;font-family:var(--f-b)}
  .tab-btn.active svg{stroke:var(--c4)}
  .tab-btn.active span{color:var(--c4)}
  .tab-badge{position:absolute;top:8px;right:calc(50% - 16px);background:#ef4444;color:#fff;font-size:8px;font-weight:700;border-radius:var(--pill);padding:1px 4px;min-width:14px;text-align:center}

  /* Ocultar bottom bar en mobile */
  .bottom-bar{display:none}

  /* Health widget mobile — más compacto */
  .health-widget{margin:8px 8px 4px;padding:10px 12px}

  /* Sensor cards mobile — sin hover transform */
  .sensor-card:hover{transform:none}

  /* Mostrar decisión en card mobile */
  .sc-decision{display:block}
}

/* Tab bar oculta en desktop */
@media(min-width:768px){
  .tab-bar{display:none}
  .health-widget{display:flex}
  .sidebar.active,.map-area.active{display:flex}
  .app>.sidebar{display:flex}
  .app>.map-area{display:block}
  .sc-decision{display:none}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadOverlay">
  <div class="loading-logo"><span>i</span><span>n</span><span>g</span><span>e</span><span>n</span><span>i</span><span>o</span><span>+</span></div>
  <div class="loading-tagline">crecemos juntos</div>
  <div class="loading-msg" id="loadMsg">Conectando al sistema...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="logo"><span>i</span><span>n</span><span>g</span><span>e</span><span>n</span><span>i</span><span>o</span><span>+</span></div>
  <div class="farm-block">
    <div class="farm-name" id="farmName">Cargando...</div>
    <div class="farm-sub" id="farmSub">Conectando...</div>
  </div>
  <div class="top-r">
    <div class="offline-badge">📡 Sin internet en campo</div>
    <span class="source-badge" id="srcBadge">demo</span>
    <div class="conn-badge"><div class="conn-dot" id="connDot"></div><span id="connTxt">MQTT</span></div>
  </div>
</div>

<script>
// =============================================================================
// Ingenio+ Dashboard v3 — Mobile-first PWA + Desktop responsive
// Un solo codebase — CSS media queries adaptan el layout
// Backend: OpenRemote + InfluxDB + EMQX (via proxies Nginx)
// =============================================================================

const REALM   = new URLSearchParams(location.search).get('realm') || 'master';
const OR_PASS = new URLSearchParams(location.search).get('pass')  || 'linuxxl2';
const MQ_URL  = `ws://${location.hostname}:8083/mqtt`;
const AUTH_TOKEN_URL = `/api/auth/realms/${REALM}/protocol/openid-connect/token`;
const OR_ASSET_QUERY = `/api/or/api/${REALM}/asset/query`;
const OR_ASSET_BASE  = `/api/or/api/${REALM}/asset`;
const INFLUX_URL     = `/api/historial?org=agrosensor`;

// Detectar mobile una vez
const IS_MOBILE = () => window.innerWidth < 768;

// Diccionario traducción (opcional — si no existe muestra nombre real)
const ATTR_LABELS = {
  salinity:'💧 Humedad suelo',soilMoisture:'💧 Humedad suelo',soil_moisture:'💧 Humedad suelo',humidity:'💧 Humedad',
  temperature:'🌡️ Temperatura',temp:'🌡️ Temperatura',
  soilTensionMeasured:'⚗️ pH',pH:'⚗️ pH',ph:'⚗️ pH',
  battery:'🔋 Batería',batteryLevel:'🔋 Batería',
  rssi:'📡 Señal',signalStrength:'📡 Señal',
  nitrogen:'🌿 Nitrógeno',phosphorus:'🌿 Fósforo',potassium:'🌿 Potasio',
};
const ATTR_UNITS = {
  salinity:'%',soilMoisture:'%',soil_moisture:'%',humidity:'%',
  temperature:'°C',temp:'°C',battery:'%',batteryLevel:'%',
  rssi:' dBm',nitrogen:' mg/kg',phosphorus:' mg/kg',potassium:' mg/kg',
};
const MOISTURE_ATTRS = ['soilMoisture','salinity','soil_moisture','humidity'];
const TEMP_ATTRS     = ['temperature','temp'];
const BAT_ATTRS      = ['battery','batteryLevel'];
const RSSI_ATTRS     = ['rssi','signalStrength'];
const SKIP_ATTRS     = ['location','notes','status','childAssetType','consolePlatform',
  'consoleVersion','consoleName','consoleProviders','agentStatus','agentDisabled',
  'resumeSession','secureMode','websocketMode','lastWillTopic','lastWillRetain',
  'lastWillPayload','wildcardSubscriptionTopics','subscribeQos','publishQos',
  'websocketPath','websocketQuery','clientId','certificateAlias'];

let sensors    = {};
let orToken    = null;
let mqClient   = null;
let histChart  = null;
let activeNode = null;
let dataSource = 'demo';
let alertCount = 0;
let tendencias = {};
const actuadores = {};

function getAct(id){
  if(!actuadores[id]) actuadores[id]={state:'idle',timer:null,remaining:0,duration:30};
  return actuadores[id];
}

// ── MAPA ──────────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[1.2136,-77.2790],zoom:14,zoomControl:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

function fitMapToSensors() {
  const arr = Object.values(sensors).filter(s=>s.lat&&s.lng);
  if(!arr.length) return;
  if(arr.length===1) {
    map.setView([arr[0].lat,arr[0].lng],16);
  } else {
    const bounds = L.latLngBounds(arr.map(s=>[s.lat,s.lng]));
    map.fitBounds(bounds,{padding:[60,60],maxZoom:17});
  }
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function getToken(){
  try{
    const r=await fetch(AUTH_TOKEN_URL,{method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=password&client_id=openremote&username=admin&password=${OR_PASS}`});
    if(!r.ok) return null;
    orToken=(await r.json()).access_token;
    return orToken;
  }catch{return null;}
}
async function orFetch(url,opts={}){
  if(!orToken) await getToken();
  if(!orToken) return null;
  try{
    const r=await fetch(url,{...opts,
      headers:{'Authorization':`Bearer ${orToken}`,'Content-Type':'application/json',...(opts.headers||{})}});
    if(r.status===401){orToken=null;return null;}
    if(!r.ok) return null;
    const txt=await r.text();
    return txt?JSON.parse(txt):null;
  }catch{return null;}
}

// ── CARGA ASSETS ──────────────────────────────────────────────────────────────
async function loadAssets(){
  setMsg('Conectando a OpenRemote...');
  if(!await getToken()){
    setMsg('OpenRemote no disponible — modo demo');
    setTimeout(()=>{loadDemo();hideLoad();},1200);
    return;
  }
  setMsg('Cargando sensores...');
  let assets=await orFetch(OR_ASSET_QUERY,{method:'POST',
    body:JSON.stringify({types:['SoilSensorAsset'],recursive:true})});
  if(!assets?.length){
    assets=await orFetch(OR_ASSET_QUERY,{method:'POST',body:JSON.stringify({recursive:true})});
    if(assets) assets=assets.filter(a=>a.type&&!a.type.includes('Agent')&&
      a.type!=='GroupAsset'&&a.type!=='ConsoleAsset');
  }
  if(!assets?.length){
    setMsg('Sin sensores — modo demo');
    setTimeout(()=>{loadDemo();hideLoad();},1200);
    return;
  }
  dataSource='openremote';
  document.getElementById('srcBadge').textContent='OpenRemote';
  document.getElementById('srcBadge').classList.add('live');
  document.getElementById('farmName').textContent=REALM!=='master'?REALM:'Mi Finca';
  document.getElementById('farmSub').textContent=`${assets.length} sensor(es) activos`;
  assets.forEach(a=>{
    const attr=a.attributes||{};
    const v=n=>attr[n]?.value??null;
    const loc=v('location');
    const numAttrs={};
    Object.entries(attr).forEach(([name,obj])=>{
      if(obj.value!==null&&obj.value!==undefined&&!isNaN(parseFloat(obj.value))
        &&isFinite(obj.value)&&!SKIP_ATTRS.includes(name))
        numAttrs[name]=parseFloat(obj.value);
    });
    addSensor({
      id:a.id,name:a.name||'Sensor',
      lat:loc?.coordinates?.[1]??(1.2136+Math.random()*.015),
      lng:loc?.coordinates?.[0]??(-77.279+Math.random()*.015),
      status:v('status')||'ONLINE',
      soil_moisture:firstVal(numAttrs,MOISTURE_ATTRS),
      temperature:firstVal(numAttrs,TEMP_ATTRS),
      battery:firstVal(numAttrs,BAT_ATTRS),
      rssi:firstVal(numAttrs,RSSI_ATTRS),
      ph:numAttrs.soilTensionMeasured??numAttrs.pH??numAttrs.ph,
      recommendation:v('recommendation'),
      lastSeen:Date.now(),orId:a.id,allAttrs:numAttrs,
    });
  });
  addAlert('ok',`✅ Conectado a OpenRemote — ${assets.length} sensor(es)`);
  fitMapToSensors();
  updateHealthScore();
  hideLoad();
  Object.keys(sensors).forEach(id=>loadTendencia(id));
}

function firstVal(obj,keys){
  for(const k of keys){if(obj[k]!=null)return obj[k];}
  return null;
}

function loadDemo(){
  dataSource='demo';
  document.getElementById('farmName').textContent='Finca La Esperanza';
  document.getElementById('farmSub').textContent='Modo demo activo';
  [{id:'s001',name:'Sensor Norte Lote 1',lat:1.2145,lng:-77.2795,status:'ONLINE',
    soil_moisture:68,temperature:22.4,ph:6.8,battery:87,rssi:-72,
    recommendation:'✅ Condiciones normales.',
    allAttrs:{soilMoisture:68,temperature:22.4,pH:6.8,battery:87,rssi:-72,nitrogen:142}},
   {id:'s002',name:'Sensor Invernadero',lat:1.2128,lng:-77.2785,status:'ONLINE',
    soil_moisture:38,temperature:24.1,ph:6.5,battery:64,rssi:-81,
    recommendation:'💧 Humedad baja. Regar hoy.',
    allAttrs:{soilMoisture:38,temperature:24.1,pH:6.5,battery:64,rssi:-81}},
   {id:'s003',name:'Sensor Zona Cafetera',lat:1.2138,lng:-77.2810,status:'DEGRADED',
    soil_moisture:25,temperature:19.8,ph:5.9,battery:22,rssi:-94,
    recommendation:'⚠️ Batería crítica. Revisión urgente.',
    allAttrs:{soilMoisture:25,temperature:19.8,pH:5.9,battery:22,rssi:-94}},
  ].forEach(addSensor);
  tendencias={
    s001:{soil_moisture:+3.2,temperature:-0.5},
    s002:{soil_moisture:-6.1,temperature:+1.2},
    s003:{soil_moisture:-8.4,temperature:-2.1},
  };
  addAlert('warn','⚠️ Modo demo — OpenRemote no disponible');
  fitMapToSensors();
  updateHealthScore();
  renderList();
}

// ── SENSOR AL MAPA ────────────────────────────────────────────────────────────
function addSensor(s){
  sensors[s.id]={...(sensors[s.id]||{}),...s};
  const col={ONLINE:'#22c55e',DEGRADED:'#F4D74E',OFFLINE:'#ef4444'}[s.status]||'#22c55e';
  const ico={ONLINE:'💧',DEGRADED:'⚠️',OFFLINE:'📵'}[s.status]||'💧';
  const icon=L.divIcon({className:'',
    html:`<div style="width:36px;height:36px;border-radius:50%;background:${col};border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:transform .2s" onmouseenter="this.style.transform='scale(1.15)'" onmouseleave="this.style.transform='scale(1)'" onclick="selectSensor('${s.id}')">${ico}</div>`,
    iconSize:[36,36],iconAnchor:[18,18]});
  if(sensors[s.id].marker) map.removeLayer(sensors[s.id].marker);
  sensors[s.id].marker=L.marker([s.lat,s.lng],{icon}).addTo(map)
    .bindTooltip(`<b>${s.name}</b><br>${getStatusText(s)}`,{permanent:false,direction:'top'});
  renderList();
  updateBar();
  updateHealthScore();
}

function getStatusText(s){
  const h=s.soil_moisture;
  if(h==null)return s.status;
  if(h<25)return `💧 ${h}% — Regar urgente`;
  if(h<40)return `💧 ${h}% — Regar hoy`;
  return `💧 ${h}% — Normal`;
}

// ── LISTA LATERAL ─────────────────────────────────────────────────────────────
function renderList(){
  const arr=Object.values(sensors);
  if(!arr.length)return;
  const hw=document.getElementById('healthWidget');
  if(hw)hw.style.display='flex';
  document.getElementById('sensorList').innerHTML=arr.map(s=>{
    const hum=s.soil_moisture,temp=s.temperature,bat=s.battery;
    const tend=tendencias[s.id]||{};
    const humTrend=trendIcon(tend.soil_moisture);
    const batClass=bat==null?'':bat>50?'high':bat>20?'med':'low';
    const batDays=estimateDays(bat);
    const {cls:riegoCls,lbl:riegoLbl}=calcRiego(s,tend);
    return `
    <div class="sensor-card${activeNode===s.id?' active':''}" onclick="selectSensor('${s.id}')">
      <div class="sc-top">
        <div class="sc-dot st-${(s.status||'ONLINE').toLowerCase()}"></div>
        <div class="sc-name">${s.name}</div>
        <div class="sc-time">${timeAgo(s.lastSeen||Date.now())}</div>
      </div>
      <div class="sc-decision ${riegoCls}">${riegoLbl}</div>
      <div class="kpi-mini">
        <div class="km">
          <div class="km-top"><div class="km-v">${fmt(hum,0)}%</div>
            <div class="km-trend ${humTrend.cls}">${humTrend.ico}</div></div>
          <div class="km-l">💧 Humedad</div></div>
        <div class="km">
          <div class="km-top"><div class="km-v">${fmt(temp,1)}°</div></div>
          <div class="km-l">🌡️ Temperatura</div></div>
      </div>
      <div class="bat-row">
        <span style="font-size:10px">🔋</span>
        <div class="bat-bar"><div class="bat-fill ${batClass}" style="width:${bat||0}%"></div></div>
        <span class="bat-val">${fmt(bat,0)}%</span>
        ${batDays?`<span class="bat-days">~${batDays}d</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── SALUD ─────────────────────────────────────────────────────────────────────
function calcHealth(s){
  if(s.status==='OFFLINE')return 0;
  const hum=s.soil_moisture??50,bat=s.battery??100,rssi=s.rssi??-70;
  const humScore=hum>=40&&hum<=70?100:hum<40?Math.max(0,hum/40*100):Math.max(0,(100-hum)/30*100);
  const batScore=Math.min(100,bat*1.2);
  const rssiScore=Math.max(0,Math.min(100,(rssi+110)/50*100));
  return Math.round(humScore*.5+batScore*.3+rssiScore*.2);
}

function updateHealthScore(){
  const arr=Object.values(sensors);
  if(!arr.length)return;
  const scores=arr.map(calcHealth);
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const arc=document.getElementById('healthArc');
  const num=document.getElementById('healthNum');
  const label=document.getElementById('healthLabel');
  const desc=document.getElementById('healthDesc');
  if(!arc)return;
  arc.style.strokeDashoffset=138.2-(avg/100*138.2);
  let color,lt,dt,cls;
  if(avg>=80){color='#22c55e';lt='Su finca está bien';dt='Condiciones normales';cls='good';}
  else if(avg>=50){color='#F4D74E';lt='Hay algo que revisar';dt='Algunos sensores necesitan atención';cls='warn';}
  else{color='#ef4444';lt='Necesita actuar hoy';dt='Condiciones críticas detectadas';cls='crit';}
  arc.style.stroke=color;num.textContent=avg;num.style.color=color;
  label.textContent=lt;label.className=`health-label ${cls}`;desc.textContent=dt;
  const bar=document.getElementById('healthBar');
  if(bar)bar.innerHTML=arr.map((_,i)=>{
    const sc=scores[i];const c=sc>=80?'#22c55e':sc>=50?'#F4D74E':'#ef4444';
    return `<div class="hb-seg" style="background:${c};opacity:.7"></div>`;
  }).join('');
}

// ── SELECCIONAR SENSOR ────────────────────────────────────────────────────────
async function selectSensor(id){
  activeNode=id;
  const s=sensors[id];
  if(!s)return;

  // Mobile: ir a vista detalle (que está en el mapa view)
  if(IS_MOBILE()){
    switchTab('map');
  }

  map.flyTo([s.lat,s.lng],16,{duration:.8});
  document.getElementById('dpName').textContent=s.name;
  document.getElementById('dpLoc').textContent=`${s.status} · ${timeAgo(s.lastSeen||Date.now())}`;
  document.getElementById('dpBody').innerHTML='<div style="text-align:center;padding:20px;color:var(--faint);font-size:12px">Cargando datos...</div>';
  document.getElementById('detailPanel').classList.add('show');
  renderList();

  if(s.orId&&dataSource==='openremote'){
    const fresh=await orFetch(`${OR_ASSET_BASE}/${s.orId}`);
    if(fresh?.attributes){
      const attr=fresh.attributes;
      const numAttrs={};
      Object.entries(attr).forEach(([name,obj])=>{
        if(obj.value!==null&&obj.value!==undefined&&!isNaN(parseFloat(obj.value))
          &&isFinite(obj.value)&&!SKIP_ATTRS.includes(name))
          numAttrs[name]=parseFloat(obj.value);
      });
      Object.assign(sensors[id],{
        soil_moisture:firstVal(numAttrs,MOISTURE_ATTRS)??s.soil_moisture,
        temperature:firstVal(numAttrs,TEMP_ATTRS)??s.temperature,
        battery:firstVal(numAttrs,BAT_ATTRS)??s.battery,
        rssi:firstVal(numAttrs,RSSI_ATTRS)??s.rssi,
        ph:numAttrs.soilTensionMeasured??numAttrs.pH??numAttrs.ph??s.ph,
        recommendation:attr.recommendation?.value||s.recommendation,
        allAttrs:numAttrs,lastSeen:Date.now(),
      });
    }
  }
  renderDetail(sensors[id]);
  loadChart(id);
}

function renderDetail(s){
  const health=calcHealth(s);
  const tend=tendencias[s.id]||{};
  const batDays=estimateDays(s.battery);
  const {cls:riegoCls,lbl:riegoLbl,txt:riegoTxt}=calcRiego(s,tend);
  const scoreCol=health>=80?'good':health>=50?'warn':'crit';
  const scoreLabel=health>=80?'Finca en buen estado':health>=50?'Requiere atención':'Estado crítico';
  const allAttrs=s.allAttrs||{};
  const kpiEntries=Object.entries(allAttrs).filter(([k])=>!SKIP_ATTRS.includes(k)).slice(0,6);
  const kpisHtml=kpiEntries.map(([name,val])=>{
    const unit=ATTR_UNITS[name]||'';
    const label=ATTR_LABELS[name]||name.replace(/_/g,' ').replace(/([A-Z])/g,' $1').trim();
    const dec=unit==='%'||unit===''?1:0;
    const isMoisture=MOISTURE_ATTRS.includes(name);
    const isTemp=TEMP_ATTRS.includes(name);
    const trendDelta=isMoisture?tend.soil_moisture:isTemp?tend.temperature:null;
    const tr=trendIcon(trendDelta);
    return `<div class="dp-kpi">
      <div class="dp-kpi-top">
        <div class="dp-val">${fmt(val,dec)}${unit}</div>
        ${trendDelta!=null?`<div class="dp-trend ${tr.cls}">${tr.ico}</div>`:''}
      </div>
      <div class="dp-lbl">${label}</div>
      ${isMoisture&&tend.soil_moisture!=null?`<div class="dp-compare">${tend.soil_moisture>0?'+':''}${fmt(tend.soil_moisture,1)}% vs 3h</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('dpBody').innerHTML=`
    <div class="dp-score">
      <div class="dp-score-num ${scoreCol}">${health}</div>
      <div class="dp-score-info">
        <div class="dp-score-label">${scoreLabel}</div>
        <div class="dp-score-sub">Índice de salud</div>
      </div>
    </div>
    <div class="dp-riego ${riegoCls}">
      <div class="dp-riego-lbl">${riegoLbl}</div>
      <div class="dp-riego-txt">${riegoTxt}</div>
    </div>
    <div class="dp-kpis">${kpisHtml}</div>
    ${s.recommendation?`<div class="dp-rec"><div class="dp-rec-lbl">Recomendación</div><div class="dp-rec-txt">${s.recommendation}</div></div>`:''}
    <div class="act-block" id="actBlock_${s.id}">
      <div class="act-title">🚿 Control de riego</div>
      <div class="act-row">
        <div class="act-status" id="actStatus_${s.id}">${getActStatusText(s.id)}<small id="actSub_${s.id}">${getActSubText(s.id)}</small></div>
        <button class="btn-riego ${getActBtnClass(s.id)}" id="actBtn_${s.id}" onclick="toggleRiego('${s.id}')">${getActBtnText(s.id)}</button>
      </div>
      <div class="act-timer" id="actTimer_${s.id}">${getTimerStr(s.id)}</div>
      <div class="act-duration" id="actDuration_${s.id}" style="${getAct(s.id).state==='idle'?'':'display:none'}">
        ${[15,30,45,60].map(m=>`<button class="dur-btn${getAct(s.id).duration===m?' selected':''}" onclick="setDuration('${s.id}',${m})">${m} min</button>`).join('')}
      </div>
    </div>
    <div class="chart-label">Humedad últimas 24h</div>
    <div class="chart-wrap"><canvas id="histChart"></canvas></div>
    <div class="dp-hw">
      <span class="hw-tag">RSSI ${s.rssi||'—'} dBm</span>
      ${batDays?`<span class="hw-tag">🔋 ~${batDays}d</span>`:''}
      <span class="hw-tag">${dataSource==='openremote'?'OpenRemote':'Demo'}</span>
      <span class="hw-tag">LoRa 915MHz</span>
    </div>`;
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('show');
  activeNode=null;
  if(histChart){histChart.destroy();histChart=null;}
  renderList();
  // Mobile: volver al home
  if(IS_MOBILE()) switchTab('home');
}

// ── NAVEGACIÓN MOBILE ─────────────────────────────────────────────────────────
function switchTab(tab){
  if(!IS_MOBILE())return;
  const home=document.getElementById('viewHome');
  const mapV=document.getElementById('viewMap');
  ['home','map','alerts'].forEach(t=>{
    document.getElementById(`tab-${t}`)?.classList.remove('active');
  });
  document.getElementById(`tab-${tab}`)?.classList.add('active');

  if(tab==='home'){
    home.classList.add('active');mapV.classList.remove('active');
    document.getElementById('detailPanel').classList.remove('show');
    showPanel('sensores',document.querySelector('.snav-btn'));
  } else if(tab==='map'){
    mapV.classList.add('active');home.classList.remove('active');
    setTimeout(()=>map.invalidateSize(),50);
  } else if(tab==='alerts'){
    home.classList.add('active');mapV.classList.remove('active');
    showPanel('alertas',document.querySelectorAll('.snav-btn')[1]);
    alertCount=0;
    const b=document.getElementById('alertBadge');if(b)b.style.display='none';
    const tb=document.getElementById('tabBadge');if(tb)tb.style.display='none';
  }
}

function showPanel(id,btn){
  ['sensores','alertas'].forEach(p=>document.getElementById(`panel-${p}`).style.display=p===id?'':'none');
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(id==='alertas'){
    alertCount=0;
    const b=document.getElementById('alertBadge');if(b)b.style.display='none';
    const tb=document.getElementById('tabBadge');if(tb)tb.style.display='none';
  }
}

// ── ¿REGAR HOY? ───────────────────────────────────────────────────────────────
function calcRiego(s,tend){
  const hum=s.soil_moisture;
  if(hum==null)return{cls:'revisar',lbl:'Sin datos',txt:'Sin datos de humedad.'};
  const cayendo=tend?.soil_moisture!=null&&tend.soil_moisture<-3;
  if(hum<25)return{cls:'si',lbl:'💧 Regar hoy — urgente',txt:`Humedad crítica (${fmt(hum,0)}%). Regar al menos 45 min lo antes posible.`};
  if(hum<40)return{cls:'si',lbl:'💧 Regar hoy',txt:`Humedad baja (${fmt(hum,0)}%). Regar 30 min antes del mediodía.`};
  if(hum<50&&cayendo)return{cls:'revisar',lbl:'⚠️ Monitorear — bajando',txt:`Humedad en descenso (${fmt(hum,0)}%). Considerar riego en las próximas horas.`};
  if(hum>80)return{cls:'no',lbl:'✅ No regar — suelo saturado',txt:`Humedad alta (${fmt(hum,0)}%). Suspender riego.`};
  return{cls:'no',lbl:'✅ No necesita riego hoy',txt:`Humedad adecuada (${fmt(hum,0)}%). Próxima revisión en 24h.`};
}

// ── TENDENCIA ─────────────────────────────────────────────────────────────────
async function loadTendencia(nodeId){
  try{
    const flux=`from(bucket:"sensores")|>range(start:-3h)|>filter(fn:(r)=>r._measurement=="sensor_data"and r.node_id=="${nodeId}")|>filter(fn:(r)=>r._field=="soil_moisture"or r._field=="temperature")|>first()`;
    const r=await fetch(INFLUX_URL,{method:'POST',headers:{'Content-Type':'application/vnd.flux'},body:flux});
    if(!r.ok)return;
    const csv=await r.text();
    const result={};
    csv.split('\n').forEach(row=>{
      if(!row||row.startsWith('#')||row.startsWith(',result'))return;
      const cols=row.split(',');
      if(cols.length>=7){const field=cols[5]?.trim()||cols[4]?.trim();const val=parseFloat(cols[cols.length-1]);if(!isNaN(val)&&field)result[field]=val;}
    });
    const s=sensors[nodeId];if(!s)return;
    const delta={};
    if(result.soil_moisture!=null&&s.soil_moisture!=null)delta.soil_moisture=s.soil_moisture-result.soil_moisture;
    if(result.temperature!=null&&s.temperature!=null)delta.temperature=s.temperature-result.temperature;
    tendencias[nodeId]=delta;
    renderList();
    if(activeNode===nodeId)renderDetail(sensors[nodeId]);
  }catch{}
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────────
async function loadChart(nodeId){
  const s=sensors[nodeId];if(!s)return;
  await new Promise(r=>setTimeout(r,60));
  const canvas=document.getElementById('histChart');if(!canvas)return;
  if(histChart){histChart.destroy();histChart=null;}
  let labels=[],data=[];
  try{
    const flux=`from(bucket:"sensores")|>range(start:-24h)|>filter(fn:(r)=>r._measurement=="sensor_data"and r.node_id=="${nodeId}"and r._field=="soil_moisture")|>aggregateWindow(every:1h,fn:mean,createEmpty:false)|>yield()`;
    const r=await fetch(INFLUX_URL,{method:'POST',headers:{'Content-Type':'application/vnd.flux'},body:flux});
    if(r.ok){
      const csv=await r.text();
      csv.split('\n').forEach(row=>{
        if(!row||row.startsWith('#')||row.startsWith(',result'))return;
        const cols=row.split(',');
        if(cols.length>=7){const t=new Date(cols[5]);const v=parseFloat(cols[6]);
          if(!isNaN(t.getTime())&&!isNaN(v)){labels.push(`${t.getHours()}:00`);data.push(+(v.toFixed(1)));}}
      });
    }
  }catch{}
  if(!data.length){
    const base=s.soil_moisture||50;
    for(let i=23;i>=0;i--){const h=new Date(Date.now()-i*3600000);labels.push(`${h.getHours()}:00`);
      data.push(+(Math.max(10,Math.min(95,base+(Math.random()-.5)*18)).toFixed(1)));}
  }
  const thLine={id:'th',beforeDraw(c){
    const{ctx,chartArea:{left,right},scales:{y}}=c;const yp=y.getPixelForValue(40);
    ctx.save();ctx.strokeStyle='rgba(232,116,42,.4)';ctx.setLineDash([4,4]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();
  }};
  histChart=new Chart(canvas.getContext('2d'),{type:'line',plugins:[thLine],
    data:{labels,datasets:[{label:'Humedad %',data,borderColor:'#1FA187',
      backgroundColor:'rgba(31,161,135,.12)',borderWidth:2,pointRadius:0,fill:true,tension:.4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:9},maxTicksLimit:6,color:'#90AEB8'},grid:{display:false},border:{display:false}},
        y:{ticks:{font:{size:9},color:'#90AEB8'},min:0,max:100,border:{display:false},grid:{color:'rgba(15,32,40,.05)'}}}}});
}

// ── ACTUADOR ──────────────────────────────────────────────────────────────────
function getActStatusText(id){return{idle:'Listo para activar',pending:'Enviando comando...',active:'Riego activo',error:'Sin respuesta',off:'Apagando...'}[getAct(id).state]||'—';}
function getActSubText(id){const a=getAct(id);if(a.state==='idle')return`Duración: ${a.duration} min`;if(a.state==='active')return`${a.remaining} min restantes`;return'';}
function getActBtnClass(id){return{idle:'idle',pending:'pending',active:'off',error:'error'}[getAct(id).state]||'idle';}
function getActBtnText(id){return{idle:'💧 Activar',pending:'⏳ Enviando...',active:'⏹ Apagar',error:'↺ Reintentar'}[getAct(id).state]||'💧 Activar';}
function getTimerStr(id){const a=getAct(id);if(a.state!=='active')return'';const m=Math.floor(a.remaining);const s=Math.floor((a.remaining-m)*60);return`${m}:${String(s).padStart(2,'0')}`;}

function setDuration(id,min){
  getAct(id).duration=min;
  const d=document.getElementById(`actDuration_${id}`);
  if(d)d.querySelectorAll('.dur-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.textContent)===min));
  const sb=document.getElementById(`actSub_${id}`);if(sb)sb.textContent=`Duración: ${min} min`;
}

function toggleRiego(id){
  const a=getAct(id);if(a.state==='pending')return;
  if(a.state==='active'){
    a.state='off';if(a.timer){clearInterval(a.timer);a.timer=null;}
    if(mqClient)mqClient.publish(`ingenio/f01/${id}/cmd`,JSON.stringify({action:'CLOSE',ts:Date.now()}));
    setTimeout(()=>{a.state='idle';updateActUI(id);},1500);
  }else{
    a.state='pending';updateActUI(id);
    if(mqClient)mqClient.publish(`ingenio/f01/${id}/cmd`,JSON.stringify({action:'OPEN',duration_min:a.duration,ts:Date.now()}));
    a._timeout=setTimeout(()=>{if(a.state==='pending'){a.state='error';updateActUI(id);}},10000);
  }
}

function confirmRiego(id,duration){
  const a=getAct(id);if(a._timeout){clearTimeout(a._timeout);a._timeout=null;}
  a.state='active';a.remaining=duration||a.duration;updateActUI(id);
  a.timer=setInterval(()=>{
    a.remaining-=0.5;
    if(a.remaining<=0){clearInterval(a.timer);a.timer=null;a.state='idle';a.remaining=0;addAlert('ok',`✅ Riego completado en ${id}`);}
    updateActUI(id);
  },30000);
}

function updateActUI(id){
  const a=getAct(id);
  const btn=document.getElementById(`actBtn_${id}`);
  const status=document.getElementById(`actStatus_${id}`);
  const sub=document.getElementById(`actSub_${id}`);
  const timer=document.getElementById(`actTimer_${id}`);
  const dur=document.getElementById(`actDuration_${id}`);
  if(!btn)return;
  btn.className=`btn-riego ${getActBtnClass(id)}`;btn.textContent=getActBtnText(id);
  if(status)status.childNodes[0].textContent=getActStatusText(id);
  if(sub)sub.textContent=getActSubText(id);
  if(timer){timer.style.display=a.state==='active'?'block':'none';timer.textContent=getTimerStr(id);}
  if(dur)dur.style.display=a.state==='idle'?'':'none';
}

// ── MQTT ──────────────────────────────────────────────────────────────────────
function connectMQTT(){
  try{
    mqClient=mqtt.connect(MQ_URL,{clientId:`portal_${Math.random().toString(16).slice(2)}`,clean:true,reconnectPeriod:5000});
    mqClient.on('connect',()=>{
      document.getElementById('connDot').classList.add('on');
      document.getElementById('connTxt').textContent='En línea';
      mqClient.subscribe('ingenio/#');
    });
    mqClient.on('error',()=>{
      document.getElementById('connDot').classList.remove('on');
      document.getElementById('connTxt').textContent='Sin MQTT';
    });
    mqClient.on('message',(topic,payload)=>{
      try{
        const parts=topic.split('/');
        if(parts[3]==='up'){
          const nodeId=parts[2];const data=JSON.parse(payload.toString());
          if(sensors[nodeId]){
            const prev=sensors[nodeId].soil_moisture;
            Object.assign(sensors[nodeId],{
              soil_moisture:data.soil_moisture??data.soilMoisture,
              temperature:data.temperature,battery:data.battery,rssi:data.rssi,
              lastSeen:Date.now(),status:'ONLINE',
              allAttrs:{...sensors[nodeId].allAttrs,...data},
            });
            if(prev!=null&&data.soil_moisture!=null){
              if(!tendencias[nodeId])tendencias[nodeId]={};
              tendencias[nodeId].soil_moisture=data.soil_moisture-prev;
            }
            addSensor(sensors[nodeId]);
            if(activeNode===nodeId)renderDetail(sensors[nodeId]);
          }
        }
        if(parts[3]==='alertas'||parts[2]==='alertas'){
          const data=JSON.parse(payload.toString());
          addAlert(data.type||'warn',data.msg||data.message||'Alerta del sistema');
        }
        if(parts[3]==='ack'){
          const nodeId=parts[2];const data=JSON.parse(payload.toString());
          if(data.status==='CONFIRMED'&&data.action==='OPEN'){
            confirmRiego(nodeId,data.duration_min||getAct(nodeId).duration);
            addAlert('ok',`✅ Riego activado en ${nodeId} — ${data.duration_min||getAct(nodeId).duration} min`);
          }else if(data.status==='CONFIRMED'&&data.action==='CLOSE'){
            const a=getAct(nodeId);a.state='idle';updateActUI(nodeId);
          }
        }
      }catch{}
    });
  }catch{document.getElementById('connTxt').textContent='Sin MQTT';}
}

// ── ALERTAS ───────────────────────────────────────────────────────────────────
function addAlert(type,msg){
  const list=document.getElementById('alertList');
  const noA=list.querySelector('div[style]');if(noA&&noA.textContent.includes('Sin alertas'))noA.remove();
  const el=document.createElement('div');el.className=`alert-item ${type}`;
  el.innerHTML=`<span class="al-ico">${type==='ok'?'✅':type==='warn'?'⚠️':'🚨'}</span>
    <div><div class="al-msg">${msg}</div>
    <div class="al-time">${new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</div></div>`;
  list.insertBefore(el,list.firstChild);
  if(type!=='ok'){
    alertCount++;
    const b=document.getElementById('alertBadge');if(b){b.textContent=alertCount;b.style.display='inline';}
    const tb=document.getElementById('tabBadge');if(tb){tb.textContent=alertCount;tb.style.display='block';}
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function trendIcon(d){if(d==null)return{ico:'',cls:'flat'};if(d>2)return{ico:'↑',cls:'up'};if(d<-2)return{ico:'↓',cls:'down'};return{ico:'→',cls:'flat'};}
const fmt=(v,d)=>(v!=null&&!isNaN(v))?parseFloat(v).toFixed(d):'—';
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'ahora';if(d<3600000)return`${Math.floor(d/60000)}min`;if(d<86400000)return`${Math.floor(d/3600000)}h`;return`${Math.floor(d/86400000)}d`;}
function estimateDays(bat){if(bat==null||bat>95)return null;const d=Math.floor(bat/3);return d>60?null:d;}

function updateBar(){
  const arr=Object.values(sensors);
  document.getElementById('bbOn').textContent=`${arr.filter(s=>s.status==='ONLINE').length} en línea`;
  document.getElementById('bbDeg').textContent=`${arr.filter(s=>s.status==='DEGRADED').length} degradados`;
  document.getElementById('bbOff').textContent=`${arr.filter(s=>s.status==='OFFLINE').length} sin señal`;
  const n=new Date();
  document.getElementById('bbTs').textContent=`${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function setMsg(m){document.getElementById('loadMsg').textContent=m;}
function hideLoad(){
  const o=document.getElementById('loadOverlay');
  o.classList.add('hidden');
  setTimeout(()=>o.style.display='none',700);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  // Mobile: activar vista home por defecto
  if(IS_MOBILE()){
    document.getElementById('viewHome').classList.add('active');
    document.getElementById('viewMap').classList.remove('active');
  } else {
    // Desktop: mostrar mapa siempre
    document.getElementById('viewMap').classList.add('active');
  }
  connectMQTT();
  loadAssets();
  setInterval(updateBar,30000);
  setInterval(()=>Object.keys(sensors).forEach(id=>loadTendencia(id)),300000);
  // Resize handler
  window.addEventListener('resize',()=>{
    if(!IS_MOBILE()){
      document.getElementById('viewMap').classList.add('active');
      document.getElementById('viewHome').classList.add('active');
    }
    map.invalidateSize();
  });
});
</script>
