<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingenio+ | Mi Finca</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   TOKENS — Paleta exacta Ingenio+
═══════════════════════════════════════════════════════ */
:root{
  --c1:#1F5F66;--c2:#E8742A;--c3:#214F57;--c4:#1FA187;--c5:#27B1A0;
  --c6:#D83C7C;--c7:#E33C84;--c8:#F4D74E;
  --dark:#0F2028;--dark2:#162A34;--dark3:#1a2d38;
  --bg:#F5F2EC;--bg2:#EDE9E1;--surf:#FFFFFF;--surf2:#EEF7F5;
  --ink:#0F2028;--muted:#4A6870;--faint:#90AEB8;
  --on-dark:#E8F0F2;--muted-dark:#7AACB6;
  --line:rgba(15,32,40,.08);--line2:rgba(15,32,40,.14);
  --f-d:'Fraunces',Georgia,serif;--f-b:'DM Sans',system-ui,sans-serif;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--pill:999px;
  --sh:0 4px 20px rgba(15,32,40,.10);--sh-lg:0 12px 40px rgba(15,32,40,.16);
  --ease:cubic-bezier(.22,.68,0,1.18);
}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f-b);font-weight:300;
  background:var(--bg);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══ ANIMATIONS ═══ */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.7}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadbar{from{width:0}to{width:100%}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ═══ LOADING ═══ */
.loading-overlay{
  position:fixed;inset:0;background:var(--dark2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .6s var(--ease);
}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-logo{
  font-family:var(--f-d);font-size:56px;font-weight:900;
  letter-spacing:-2.5px;display:flex;margin-bottom:8px;
}
.loading-logo span:nth-child(1){color:#1F5F66}
.loading-logo span:nth-child(2){color:#E8742A}
.loading-logo span:nth-child(3){color:#214F57}
.loading-logo span:nth-child(4){color:#1FA187}
.loading-logo span:nth-child(5){color:#27B1A0}
.loading-logo span:nth-child(6){color:#D83C7C}
.loading-logo span:nth-child(7){color:#E33C84}
.loading-logo span:nth-child(8){color:#F4D74E}
.loading-tagline{font-family:var(--f-d);font-style:italic;font-size:14px;color:var(--muted-dark);margin-bottom:28px}
.loading-msg{font-size:12px;color:var(--muted-dark);margin-bottom:16px}
.loading-bar{width:180px;height:2px;background:rgba(255,255,255,.08);border-radius:var(--pill);overflow:hidden}
.loading-fill{height:100%;background:var(--c4);border-radius:var(--pill);animation:loadbar 2.5s var(--ease) forwards}

/* ═══ TOPBAR ═══ */
.topbar{
  height:56px;background:var(--dark2);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;z-index:100;
}
.logo{font-family:var(--f-d);font-size:26px;font-weight:900;letter-spacing:-1px;display:flex;user-select:none}
.logo span:nth-child(1){color:#1F5F66}.logo span:nth-child(2){color:#E8742A}
.logo span:nth-child(3){color:#214F57}.logo span:nth-child(4){color:#1FA187}
.logo span:nth-child(5){color:#27B1A0}.logo span:nth-child(6){color:#D83C7C}
.logo span:nth-child(7){color:#E33C84}.logo span:nth-child(8){color:#F4D74E}

/* Nombre finca prominente */
.farm-block{display:flex;flex-direction:column;align-items:center}
.farm-name{
  font-family:var(--f-d);font-size:16px;font-weight:600;
  color:#fff;letter-spacing:-.02em;line-height:1.1;
}
.farm-sub{font-size:10px;color:var(--muted-dark);margin-top:1px}

/* Badges topbar */
.top-r{display:flex;align-items:center;gap:10px}
.offline-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(31,161,135,.15);border:1px solid rgba(31,161,135,.3);
  border-radius:var(--pill);padding:4px 10px;
  font-size:10px;font-weight:600;color:var(--c5);
  letter-spacing:.04em;
}
.offline-badge::before{content:'📡';font-size:10px}
.source-badge{
  font-size:10px;padding:3px 8px;border-radius:var(--pill);
  background:rgba(255,255,255,.07);color:var(--muted-dark);
}
.source-badge.live{background:rgba(31,161,135,.2);color:var(--c5)}
.conn-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted-dark)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;transition:background .3s}
.conn-dot.on{background:#22c55e;animation:blink 2.5s infinite}

/* ═══ HEALTH SCORE BAR ═══ */
.health-bar{
  height:3px;background:var(--dark3);flex-shrink:0;
  display:flex;gap:1px;
}
.hb-segment{flex:1;transition:background .5s}

/* ═══ LAYOUT ═══ */
.app{display:flex;height:calc(100vh - 59px)}
.sidebar{width:296px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--line2);display:flex;flex-direction:column;overflow:hidden}
.map-area{flex:1;position:relative}
#map{width:100%;height:100%}

/* ═══ SIDEBAR NAV ═══ */
.snav{display:flex;border-bottom:2px solid var(--line)}
.snav-btn{
  flex:1;padding:11px 4px;border:none;background:none;
  font-family:var(--f-b);font-size:11px;font-weight:600;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;
}
.snav-btn.active{color:var(--c3);border-bottom-color:var(--c4)}
.spanel{flex:1;overflow-y:auto;padding:10px}
.spanel::-webkit-scrollbar{width:3px}
.spanel::-webkit-scrollbar-thumb{background:var(--c5);border-radius:9px}

/* ═══ HEALTH SCORE WIDGET ═══ */
.health-widget{
  margin:10px 10px 0;padding:12px 14px;
  background:var(--dark2);border-radius:var(--r16);
  display:flex;align-items:center;gap:12px;
}
.health-circle{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.health-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.health-num{
  font-family:var(--f-d);font-size:20px;font-weight:700;
  color:#fff;line-height:1;position:relative;z-index:1;
}
.health-info{flex:1}
.health-label{font-size:11px;font-weight:600;margin-bottom:2px}
.health-label.good{color:#22c55e}
.health-label.warn{color:var(--c8)}
.health-label.crit{color:#ef4444}
.health-desc{font-size:10px;color:var(--muted-dark);line-height:1.4}

/* ═══ SENSOR CARDS ═══ */
.sensor-card{
  background:var(--bg);border:1.5px solid var(--line2);border-radius:var(--r16);
  padding:11px;margin-bottom:7px;cursor:pointer;
  transition:all .2s var(--ease);
}
.sensor-card:hover{border-color:var(--c5);transform:translateX(2px);box-shadow:var(--sh)}
.sensor-card.active{border-color:var(--c4);background:var(--surf2);box-shadow:var(--sh)}
.sc-top{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-online{background:#22c55e;animation:pulse 2.5s infinite}
.st-degraded{background:var(--c8);animation:blink 1.5s infinite}
.st-offline{background:#ef4444}
.sc-name{font-family:var(--f-d);font-size:13px;font-weight:600;color:var(--ink);flex:1;line-height:1.2}
.sc-time{font-size:10px;color:var(--faint);white-space:nowrap}

/* KPI mini en card */
.kpi-mini{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.km{background:#fff;border-radius:var(--r8);padding:6px 8px;border:1px solid var(--line)}
.km-top{display:flex;align-items:baseline;gap:4px}
.km-v{font-family:var(--f-d);font-size:15px;font-weight:700;line-height:1;color:var(--c4)}
.km-trend{font-size:11px;font-weight:600}
.km-trend.up{color:#22c55e}.km-trend.down{color:#ef4444}.km-trend.flat{color:var(--faint)}
.km-l{font-size:9px;color:var(--muted);margin-top:2px}

/* Batería mejorada */
.bat-row{display:flex;align-items:center;gap:6px}
.bat-bar{flex:1;height:3px;background:var(--line2);border-radius:var(--pill);overflow:hidden}
.bat-fill{height:100%;border-radius:var(--pill);transition:width .5s var(--ease)}
.bat-fill.high{background:linear-gradient(90deg,var(--c4),var(--c5))}
.bat-fill.med{background:var(--c8)}
.bat-fill.low{background:#ef4444}
.bat-val{font-size:10px;color:var(--muted);white-space:nowrap}
.bat-days{font-size:9px;color:var(--faint)}

/* ═══ ALERTAS ═══ */
.alert-item{
  display:flex;align-items:flex-start;gap:8px;
  background:var(--bg);border-radius:var(--r12);padding:9px 11px;
  margin-bottom:6px;border-left:3px solid var(--line2);
  animation:slideIn .3s var(--ease) both;
}
.alert-item.ok{border-left-color:#22c55e}
.alert-item.warn{border-left-color:var(--c8)}
.alert-item.crit{border-left-color:#ef4444}
.al-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.al-msg{font-size:11px;color:var(--ink);line-height:1.45}
.al-time{font-size:10px;color:var(--faint);margin-top:2px}
.no-alerts{text-align:center;padding:24px 12px;color:var(--faint);font-size:12px}

/* ═══ DETAIL PANEL ═══ */
.detail-panel{
  position:absolute;top:14px;right:14px;width:296px;
  background:var(--surf);border-radius:var(--r20);
  box-shadow:var(--sh-lg);border:1.5px solid var(--line2);
  z-index:1000;max-height:calc(100vh - 88px);overflow-y:auto;display:none;
}
.detail-panel.show{display:block;animation:fadeUp .3s var(--ease) both}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--c5);border-radius:9px}

.dp-header{background:var(--dark2);border-radius:var(--r20) var(--r20) 0 0;padding:14px 16px}
.dp-close{
  float:right;background:rgba(255,255,255,.1);border:none;
  color:#fff;border-radius:50%;width:22px;height:22px;
  font-size:13px;cursor:pointer;line-height:22px;text-align:center;
  transition:background .15s;
}
.dp-close:hover{background:rgba(255,255,255,.22)}
.dp-name{font-family:var(--f-d);font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.dp-loc{font-size:11px;color:var(--muted-dark)}

.dp-body{padding:14px}

/* Score detalle */
.dp-score{
  display:flex;align-items:center;gap:12px;
  background:var(--dark2);border-radius:var(--r12);
  padding:11px 14px;margin-bottom:12px;
}
.dp-score-num{
  font-family:var(--f-d);font-size:32px;font-weight:900;
  line-height:1;
}
.dp-score-num.good{color:#22c55e}
.dp-score-num.warn{color:var(--c8)}
.dp-score-num.crit{color:#ef4444}
.dp-score-info{flex:1}
.dp-score-label{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
.dp-score-sub{font-size:11px;color:var(--muted-dark);line-height:1.4}

/* KPIs detalle */
.dp-kpis{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.dp-kpi{background:var(--bg);border-radius:var(--r12);padding:10px 11px;border:1px solid var(--line)}
.dp-kpi-top{display:flex;align-items:baseline;gap:5px;margin-bottom:2px}
.dp-val{font-family:var(--f-d);font-size:20px;font-weight:700;color:var(--c4);line-height:1}
.dp-trend{font-size:13px;font-weight:700}
.dp-trend.up{color:#22c55e}.dp-trend.down{color:#ef4444}.dp-trend.flat{color:var(--faint)}
.dp-lbl{font-size:10px;color:var(--muted)}
.dp-compare{font-size:10px;color:var(--faint);margin-top:3px}

/* Riego hoy */
.dp-riego{
  border-radius:var(--r12);padding:11px 13px;margin-bottom:12px;
  border:1.5px solid;
}
.dp-riego.si{background:rgba(232,116,42,.08);border-color:rgba(232,116,42,.3)}
.dp-riego.no{background:rgba(31,161,135,.07);border-color:rgba(31,161,135,.2)}
.dp-riego.revisar{background:rgba(244,215,78,.1);border-color:rgba(244,215,78,.35)}
.dp-riego-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.dp-riego.si .dp-riego-lbl{color:var(--c2)}
.dp-riego.no .dp-riego-lbl{color:var(--c4)}
.dp-riego.revisar .dp-riego-lbl{color:#8A6200}
.dp-riego-txt{font-size:13px;color:var(--ink);line-height:1.5;font-weight:400}

/* Recomendación */
.dp-rec{
  background:rgba(31,161,135,.07);border:1.5px solid rgba(31,161,135,.18);
  border-radius:var(--r12);padding:10px 12px;margin-bottom:12px;
}
.dp-rec-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c4);margin-bottom:4px}
.dp-rec-txt{font-size:12px;color:var(--ink);line-height:1.5}

/* Gráfica */
.chart-wrap{height:100px;margin-bottom:12px}
.chart-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:500}

/* Hardware tags */
.dp-hw{display:flex;gap:5px;flex-wrap:wrap}
.hw-tag{background:var(--bg);border:1px solid var(--line2);border-radius:var(--pill);padding:2px 8px;font-size:10px;color:var(--muted)}

/* ═══ BOTTOM BAR ═══ */
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(15,32,40,.9);backdrop-filter:blur(12px);
  padding:8px 14px;display:flex;align-items:center;gap:10px;
  border-top:1px solid rgba(255,255,255,.07);z-index:999;
}
.bb-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--on-dark)}
.bb-dot{width:6px;height:6px;border-radius:50%}
.bb-spacer{flex:1}
.bb-ts{font-size:10px;color:var(--muted-dark)}
.bb-offline-tag{
  display:flex;align-items:center;gap:4px;
  background:rgba(31,161,135,.12);border:1px solid rgba(31,161,135,.25);
  border-radius:var(--pill);padding:2px 8px;
  font-size:10px;color:var(--c5);font-weight:500;
}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sidebar{width:100%;height:240px;flex-shrink:0}
  .app{flex-direction:column}
  .detail-panel{width:calc(100vw - 24px);right:12px;top:10px}
  .health-widget{margin:8px 8px 0}
}
</style>
</head>
<body>

<!-- ═══ LOADING ═══ -->
<div class="loading-overlay" id="loadOverlay">
  <div class="loading-logo"><span>i</span><span>n</span><span>g</span><span>e</span><span>n</span><span>i</span><span>o</span><span>+</span></div>
  <div class="loading-tagline">crecemos juntos</div>
  <div class="loading-msg" id="loadMsg">Conectando al sistema...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- ═══ TOPBAR ═══ -->
<div class="topbar">
  <div class="logo"><span>i</span><span>n</span><span>g</span><span>e</span><span>n</span><span>i</span><span>o</span><span>+</span></div>
  <div class="farm-block">
    <div class="farm-name" id="farmName">Cargando...</div>
    <div class="farm-sub" id="farmSub">Conectando...</div>
  </div>
  <div class="top-r">
    <div class="offline-badge">Sin internet en campo</div>
    <span class="source-badge" id="srcBadge">demo</span>
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connTxt">MQTT</span>
    </div>
  </div>
</div>

<!-- Health bar -->
<div class="health-bar" id="healthBar"></div>

<!-- ═══ APP ═══ -->
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- Health score widget -->
    <div class="health-widget" id="healthWidget" style="display:none">
      <div class="health-circle" id="healthCircle">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
          <circle id="healthArc" cx="26" cy="26" r="22" fill="none" stroke="#1FA187" stroke-width="4"
            stroke-dasharray="138.2" stroke-dashoffset="138.2" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease,stroke .5s"/>
        </svg>
        <div class="health-num" id="healthNum">—</div>
      </div>
      <div class="health-info">
        <div class="health-label" id="healthLabel">Calculando...</div>
        <div class="health-desc" id="healthDesc">Analizando todos los sensores</div>
      </div>
    </div>

    <div class="snav" style="margin-top:8px">
      <button class="snav-btn active" onclick="showPanel('sensores',this)">📡 Sensores</button>
      <button class="snav-btn" onclick="showPanel('alertas',this)">🔔 Alertas <span id="alertBadge" style="display:none;background:var(--c2);color:#fff;border-radius:var(--pill);padding:1px 5px;font-size:9px;margin-left:2px">0</span></button>
    </div>

    <div class="spanel" id="panel-sensores">
      <div id="sensorList" style="text-align:center;padding:28px 14px;color:var(--faint)">
        <div style="font-size:26px;margin-bottom:8px">📡</div>
        <div style="font-size:12px">Cargando sensores...</div>
      </div>
    </div>

    <div class="spanel" id="panel-alertas" style="display:none">
      <div id="alertList"><div class="no-alerts">Sin alertas activas ✅</div></div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-area">
    <div id="map"></div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="dp-header">
        <button class="dp-close" onclick="closeDetail()">×</button>
        <div class="dp-name" id="dpName">Sensor</div>
        <div class="dp-loc" id="dpLoc"></div>
      </div>
      <div class="dp-body" id="dpBody">
        <div style="text-align:center;padding:20px;color:var(--faint);font-size:12px">Cargando...</div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <div class="bb-stat"><div class="bb-dot" style="background:#22c55e"></div><span id="bbOn">0 en línea</span></div>
      <div class="bb-stat"><div class="bb-dot" style="background:var(--c8)"></div><span id="bbDeg">0 degradados</span></div>
      <div class="bb-stat"><div class="bb-dot" style="background:#ef4444"></div><span id="bbOff">0 sin señal</span></div>
      <div class="bb-spacer"></div>
      <div class="bb-offline-tag">📡 Funciona sin internet</div>
      <div class="bb-ts" id="bbTs">--:--</div>
    </div>
  </div>
</div>

<script>
// =============================================================================
// Ingenio+ Dashboard v2 — Plan Cosecha
// Características: atributos dinámicos OR, índice salud, tendencia, batería días
// Proxies Nginx: /api/auth/ /api/or/ /api/historial
// =============================================================================

const REALM   = new URLSearchParams(location.search).get('realm') || 'master';
const OR_PASS = new URLSearchParams(location.search).get('pass')  || 'linuxxl2';
const MQ_URL  = `ws://${location.hostname}:8083/mqtt`;

const AUTH_TOKEN_URL = `/api/auth/realms/${REALM}/protocol/openid-connect/token`;
const OR_ASSET_QUERY = `/api/or/api/${REALM}/asset/query`;
const OR_ASSET_BASE  = `/api/or/api/${REALM}/asset`;
const INFLUX_URL     = `/api/historial?org=agrosensor`;

// Diccionario de traducción de atributos OR → español
const ATTR_LABELS = {
  salinity:'💧 Humedad suelo', soilMoisture:'💧 Humedad suelo',
  soil_moisture:'💧 Humedad suelo',
  temperature:'🌡️ Temperatura', temp:'🌡️ Temperatura',
  soilTensionMeasured:'⚗️ pH', pH:'⚗️ pH', ph:'⚗️ pH',
  battery:'🔋 Batería', batteryLevel:'🔋 Batería',
  rssi:'📡 Señal', signalStrength:'📡 Señal',
  nitrogen:'🌿 Nitrógeno', phosphorus:'🌿 Fósforo', potassium:'🌿 Potasio',
  soilTensionMax:'⬆️ Tensión máx', soilTensionMin:'⬇️ Tensión mín',
  conductivity:'⚡ Conductividad', humidity:'💧 Humedad',
};

// Unidades
const ATTR_UNITS = {
  salinity:'%', soilMoisture:'%', soil_moisture:'%', humidity:'%',
  temperature:'°C', temp:'°C',
  soilTensionMeasured:'', pH:'', ph:'',
  battery:'%', batteryLevel:'%',
  rssi:' dBm', signalStrength:' dBm',
  nitrogen:' mg/kg', phosphorus:' mg/kg', potassium:' mg/kg',
  soilTensionMax:' kPa', soilTensionMin:' kPa',
  conductivity:' dS/m',
};

// Qué atributo usar para humedad (para historial y cálculos)
const MOISTURE_ATTRS = ['soilMoisture','salinity','soil_moisture','humidity'];
const TEMP_ATTRS     = ['temperature','temp'];
const BAT_ATTRS      = ['battery','batteryLevel'];
const RSSI_ATTRS     = ['rssi','signalStrength'];

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function getToken() {
  try {
    const r = await fetch(AUTH_TOKEN_URL, {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=password&client_id=openremote&username=admin&password=${OR_PASS}`
    });
    if (!r.ok) return null;
    orToken = (await r.json()).access_token;
    return orToken;
  } catch { return null; }
}

async function orFetch(url, opts={}) {
  if (!orToken) await getToken();
  if (!orToken) return null;
  try {
    const r = await fetch(url, {
      ...opts,
      headers:{'Authorization':`Bearer ${orToken}`,'Content-Type':'application/json',...(opts.headers||{})}
    });
    if (r.status === 401) { orToken=null; return null; }
    if (!r.ok) return null;
    const txt = await r.text();
    return txt ? JSON.parse(txt) : null;
  } catch { return null; }
}

// ── CARGA ASSETS ─────────────────────────────────────────────────────────────
async function loadAssets() {
  setMsg('Conectando a OpenRemote...');
  if (!await getToken()) {
    setMsg('OpenRemote no disponible — modo demo');
    setTimeout(()=>{ loadDemo(); hideLoad(); }, 1200);
    return;
  }
  setMsg('Cargando sensores...');

  // Intentar SoilSensorAsset primero, luego todos
  let assets = await orFetch(OR_ASSET_QUERY, {
    method:'POST', body:JSON.stringify({types:['SoilSensorAsset'],recursive:true})
  });
  if (!assets?.length) {
    assets = await orFetch(OR_ASSET_QUERY, {
      method:'POST', body:JSON.stringify({recursive:true})
    });
    if (assets) assets = assets.filter(a =>
      a.type && !a.type.includes('Agent') && a.type !== 'GroupAsset' && a.type !== 'ConsoleAsset'
    );
  }

  if (!assets?.length) {
    setMsg('Sin sensores — modo demo');
    setTimeout(()=>{ loadDemo(); hideLoad(); }, 1200);
    return;
  }

  dataSource = 'openremote';
  document.getElementById('srcBadge').textContent = 'OpenRemote';
  document.getElementById('srcBadge').classList.add('live');
  document.getElementById('farmName').textContent = REALM !== 'master' ? REALM : 'Mi Finca';
  document.getElementById('farmSub').textContent  = `${assets.length} sensor(es) activos`;

  assets.forEach(a => {
    const attr = a.attributes || {};
    const v    = n => attr[n]?.value ?? null;
    const loc  = v('location');

    // Leer atributos numéricos dinámicamente
    const numAttrs = {};
    // Aceptar cualquier valor numérico — sin diccionario forzado
    // OR devuelve Number, Positive integer, etc. — todos son válidos
    const SKIP_ATTRS = ['location','notes','status','childAssetType',
      'consolePlatform','consoleVersion','consoleName','consoleProviders',
      'agentStatus','agentDisabled','resumeSession','secureMode','websocketMode'];
    Object.entries(attr).forEach(([name, obj]) => {
      if (obj.value !== null && obj.value !== undefined &&
          !isNaN(parseFloat(obj.value)) && isFinite(obj.value) &&
          !SKIP_ATTRS.includes(name)) {
        numAttrs[name] = parseFloat(obj.value);
      }
    });

    // Mapear a campos conocidos con fallbacks
    const moisture = firstVal(numAttrs, MOISTURE_ATTRS);
    const temp     = firstVal(numAttrs, TEMP_ATTRS);
    const bat      = firstVal(numAttrs, BAT_ATTRS);
    const rssi     = firstVal(numAttrs, RSSI_ATTRS);

    addSensor({
      id:           a.id,
      name:         a.name || 'Sensor',
      lat:          loc?.coordinates?.[1] ?? (1.2136 + Math.random()*.015),
      lng:          loc?.coordinates?.[0] ?? (-77.279 + Math.random()*.015),
      status:       v('status') || 'ONLINE',
      soil_moisture: moisture,
      temperature:  temp,
      ph:           v('soilTensionMeasured') ?? v('pH') ?? v('ph'),
      battery:      bat,
      rssi:         rssi,
      recommendation: v('recommendation') || null,
      lastSeen:     Date.now(),
      orId:         a.id,
      allAttrs:     numAttrs, // todos los atributos numéricos
    });
  });

  addAlert('ok', `✅ Conectado a OpenRemote — ${assets.length} sensor(es)`);
  updateHealthScore();
  hideLoad();

  // Cargar tendencias en background
  Object.keys(sensors).forEach(id => loadTendencia(id));
}

function firstVal(obj, keys) {
  for (const k of keys) { if (obj[k] != null) return obj[k]; }
  return null;
}

// ── SENSOR AL MAPA ────────────────────────────────────────────────────────────
function addSensor(s) {
  sensors[s.id] = {...(sensors[s.id]||{}), ...s};
  const col = {ONLINE:'#22c55e', DEGRADED:'#F4D74E', OFFLINE:'#ef4444'}[s.status]||'#22c55e';
  const ico = {ONLINE:'💧', DEGRADED:'⚠️', OFFLINE:'📵'}[s.status]||'💧';
  const icon = L.divIcon({
    className:'',
    html:`<div style="width:36px;height:36px;border-radius:50%;background:${col};border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:transform .2s" onmouseenter="this.style.transform='scale(1.15)'" onmouseleave="this.style.transform='scale(1)'" onclick="selectSensor('${s.id}')">${ico}</div>`,
    iconSize:[36,36], iconAnchor:[18,18]
  });
  if (sensors[s.id].marker) map.removeLayer(sensors[s.id].marker);
  sensors[s.id].marker = L.marker([s.lat,s.lng],{icon})
    .addTo(map)
    .bindTooltip(`<b>${s.name}</b><br>${getStatusText(s)}`,{permanent:false,direction:'top'});
  renderList();
  updateBar();
  updateHealthScore();
  
}

function getStatusText(s) {
  const hum = s.soil_moisture;
  if (hum == null) return s.status;
  if (hum < 30) return `💧 ${hum}% — Regar hoy`;
  if (hum < 45) return `💧 ${hum}% — Revisar`;
  return `💧 ${hum}% — Normal`;
}

// ── ÍNDICE DE SALUD ───────────────────────────────────────────────────────────
function calcHealth(s) {
  const hum  = s.soil_moisture ?? 50;
  const bat  = s.battery ?? 100;
  const rssi = s.rssi ?? -70;
  if (s.status === 'OFFLINE') return 0;

  // Humedad: óptimo 40-70%
  const humScore = hum >= 40 && hum <= 70 ? 100 :
    hum < 40 ? Math.max(0, hum / 40 * 100) :
    Math.max(0, (100 - hum) / 30 * 100);

  // Batería
  const batScore = Math.min(100, bat * 1.2);

  // Señal RSSI: -60 = 100%, -110 = 0%
  const rssiScore = Math.max(0, Math.min(100, (rssi + 110) / 50 * 100));

  return Math.round(humScore * 0.5 + batScore * 0.3 + rssiScore * 0.2);
}

function updateHealthScore() {
  const arr = Object.values(sensors);
  if (!arr.length) return;

  const scores = arr.map(calcHealth);
  const avg    = Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);

  // Actualizar círculo
  const arc    = document.getElementById('healthArc');
  const num    = document.getElementById('healthNum');
  const label  = document.getElementById('healthLabel');
  const desc   = document.getElementById('healthDesc');
  if (!arc) return;

  const circumference = 138.2;
  const offset = circumference - (avg / 100 * circumference);
  arc.style.strokeDashoffset = offset;

  let color, labelTxt, descTxt, cls;
  if (avg >= 80) {
    color='#22c55e'; labelTxt='Su finca está bien'; descTxt='Condiciones normales en todos los lotes'; cls='good';
  } else if (avg >= 50) {
    color=getComputedStyle(document.documentElement).getPropertyValue('--c8').trim()||'#F4D74E';
    labelTxt='Hay algo que revisar'; descTxt='Algunos sensores necesitan atención'; cls='warn';
  } else {
    color='#ef4444'; labelTxt='Necesita actuar hoy'; descTxt='Condiciones críticas detectadas'; cls='crit';
  }

  arc.style.stroke = color;
  num.textContent  = avg;
  num.style.color  = color;
  label.textContent = labelTxt;
  label.className   = `health-label ${cls}`;
  desc.textContent  = descTxt;

  // Health bar en topbar
  const bar = document.getElementById('healthBar');
  if (bar) {
    bar.innerHTML = arr.map((s,i) => {
      const sc = scores[i];
      const col = sc>=80?'#22c55e':sc>=50?'#F4D74E':'#ef4444';
      return `<div class="hb-segment" style="background:${col};opacity:.7"></div>`;
    }).join('');
  }
}

// ── SELECCIONAR SENSOR ────────────────────────────────────────────────────────
async function selectSensor(id) {
  activeNode = id;
  const s = sensors[id];
  if (!s) return;
  map.flyTo([s.lat,s.lng], 16, {duration:.8});
  document.getElementById('dpName').textContent = s.name;
  document.getElementById('dpLoc').textContent  = `${s.status} · ${timeAgo(s.lastSeen||Date.now())}`;
  document.getElementById('dpBody').innerHTML   = '<div style="text-align:center;padding:20px;color:var(--faint);font-size:12px">Cargando datos...</div>';
  document.getElementById('detailPanel').classList.add('show');
  renderList();

  // Actualizar desde OR si disponible
  if (s.orId && dataSource==='openremote') {
    const fresh = await orFetch(`${OR_ASSET_BASE}/${s.orId}`);
    if (fresh?.attributes) {
      const attr = fresh.attributes;
      const numAttrs = {};
      const SKIP2 = ['location','notes','status','childAssetType','consolePlatform',
        'consoleVersion','consoleName','consoleProviders','agentStatus','agentDisabled'];
      Object.entries(attr).forEach(([name,obj]) => {
        if (obj.value !== null && obj.value !== undefined &&
            !isNaN(parseFloat(obj.value)) && isFinite(obj.value) &&
            !SKIP2.includes(name)) numAttrs[name] = parseFloat(obj.value);
      });
      Object.assign(sensors[id], {
        soil_moisture: firstVal(numAttrs, MOISTURE_ATTRS) ?? s.soil_moisture,
        temperature:   firstVal(numAttrs, TEMP_ATTRS)    ?? s.temperature,
        battery:       firstVal(numAttrs, BAT_ATTRS)     ?? s.battery,
        rssi:          firstVal(numAttrs, RSSI_ATTRS)    ?? s.rssi,
        ph:            numAttrs.soilTensionMeasured ?? numAttrs.pH ?? numAttrs.ph ?? s.ph,
        recommendation: attr.recommendation?.value || s.recommendation,
        allAttrs:      numAttrs,
        lastSeen:      Date.now(),
      });
    }
  }

  renderDetail(sensors[id]);
  loadChart(id);
}

function renderDetail(s) {
  const health  = calcHealth(s);
  const tend    = tendencias[s.id] || {};
  const batDays = estimateDays(s.battery);

  // ¿Regar hoy?
  const {cls:riegoCls, lbl:riegoLbl, txt:riegoTxt} = calcRiego(s, tend);

  // Construir KPIs dinámicos desde allAttrs
  const allAttrs = s.allAttrs || {};
  const kpiEntries = Object.entries(allAttrs)
    .filter(([k]) => !['location','status'].includes(k))
    .slice(0, 6);

  const kpisHtml = kpiEntries.map(([name, val]) => {
    const unit  = ATTR_UNITS[name] || '';
    // Mostrar nombre real de OpenRemote — traducción solo si existe, sino nombre tal cual
    const label = ATTR_LABELS[name] || name.replace(/_/g,' ').replace(/([A-Z])/g,' $1').trim();
    const dec   = unit === '%' || unit === '' ? 1 : 0;
    const isMoisture = MOISTURE_ATTRS.includes(name);
    const isTemp     = TEMP_ATTRS.includes(name);
    const trendDelta = isMoisture ? tend.soil_moisture : isTemp ? tend.temperature : null;
    const tr = trendIcon(trendDelta);
    return `
      <div class="dp-kpi">
        <div class="dp-kpi-top">
          <div class="dp-val">${fmt(val,dec)}${unit}</div>
          ${trendDelta!=null?`<div class="dp-trend ${tr.cls}">${tr.ico}</div>`:''}
        </div>
        <div class="dp-lbl">${label}</div>
        ${isMoisture && tend.soil_moisture != null ?
          `<div class="dp-compare">${tend.soil_moisture>0?'+':''}${fmt(tend.soil_moisture,1)}% vs 3h antes</div>` : ''}
      </div>`;
  }).join('');

  // Score color
  const scoreCol = health>=80?'good':health>=50?'warn':'crit';
  const scoreLabel = health>=80?'Finca en buen estado':health>=50?'Requiere atención':'Estado crítico';

  document.getElementById('dpBody').innerHTML = `
    <div class="dp-score">
      <div class="dp-score-num ${scoreCol}">${health}</div>
      <div class="dp-score-info">
        <div class="dp-score-label">${scoreLabel}</div>
        <div class="dp-score-sub">Índice de salud del nodo</div>
      </div>
    </div>

    <div class="dp-riego ${riegoCls}">
      <div class="dp-riego-lbl">${riegoLbl}</div>
      <div class="dp-riego-txt">${riegoTxt}</div>
    </div>

    <div class="dp-kpis">${kpisHtml}</div>

    ${s.recommendation ? `
    <div class="dp-rec">
      <div class="dp-rec-lbl">Recomendación</div>
      <div class="dp-rec-txt">${s.recommendation}</div>
    </div>` : ''}

    <div class="chart-label">Humedad últimas 24h</div>
    <div class="chart-wrap"><canvas id="histChart"></canvas></div>

    <div class="dp-hw">
      <span class="hw-tag">RSSI ${s.rssi||'—'} dBm</span>
      ${batDays?`<span class="hw-tag">🔋 ~${batDays} días</span>`:''}
      <span class="hw-tag">${dataSource==='openremote'?'OpenRemote':'Demo'}</span>
      <span class="hw-tag">LoRa 915MHz</span>
    </div>`;

  loadChart(id);
}

// ── ¿REGAR HOY? ───────────────────────────────────────────────────────────────
function calcRiego(s, tend) {
  const hum = s.soil_moisture;
  if (hum == null) return {cls:'revisar',lbl:'¿Necesita regar hoy?',txt:'Sin datos de humedad suficientes.'};

  const cayendo = tend.soil_moisture != null && tend.soil_moisture < -3;

  if (hum < 25) return {
    cls:'si',lbl:'💧 Regar hoy — urgente',
    txt:`Humedad crítica (${fmt(hum,0)}%). Regar al menos 45 minutos lo antes posible.`
  };
  if (hum < 40) return {
    cls:'si',lbl:'💧 Regar hoy',
    txt:`Humedad baja (${fmt(hum,0)}%). Se recomienda riego de 30 min antes del mediodía.`
  };
  if (hum < 50 && cayendo) return {
    cls:'revisar',lbl:'⚠️ Monitorear — bajando',
    txt:`Humedad en descenso (${fmt(hum,0)}%, ${fmt(tend.soil_moisture,1)}%/3h). Considerar riego en las próximas horas.`
  };
  if (hum > 80) return {
    cls:'no',lbl:'✅ No regar — suelo saturado',
    txt:`Humedad alta (${fmt(hum,0)}%). Suspender riego para evitar daño a raíces.`
  };
  return {
    cls:'no',lbl:'✅ No necesita riego hoy',
    txt:`Humedad adecuada (${fmt(hum,0)}%). Próxima revisión en 24h.`
  };
}

// ── TENDENCIA INFLUXDB ────────────────────────────────────────────────────────
async function loadTendencia(nodeId) {
  try {
    const flux = `
from(bucket:"sensores")
  |> range(start:-3h)
  |> filter(fn:(r) => r._measurement == "sensor_data" and r.node_id == "${nodeId}")
  |> filter(fn:(r) => r._field == "soil_moisture" or r._field == "temperature")
  |> first()`;

    const r = await fetch(INFLUX_URL, {
      method:'POST', headers:{'Content-Type':'application/vnd.flux'}, body:flux
    });
    if (!r.ok) return;
    const csv = await r.text();
    const result = {};
    csv.split('\n').forEach(row => {
      if (!row || row.startsWith('#') || row.startsWith(',result')) return;
      const cols = row.split(',');
      if (cols.length >= 7) {
        const field = cols[5]?.trim() || cols[4]?.trim();
        const val   = parseFloat(cols[cols.length-1]);
        if (!isNaN(val) && field) result[field] = val;
      }
    });

    // Calcular delta vs valor actual
    const s = sensors[nodeId];
    if (!s) return;
    const delta = {};
    if (result.soil_moisture != null && s.soil_moisture != null)
      delta.soil_moisture = s.soil_moisture - result.soil_moisture;
    if (result.temperature != null && s.temperature != null)
      delta.temperature = s.temperature - result.temperature;

    tendencias[nodeId] = delta;
    renderList();
    if (activeNode === nodeId) renderDetail(sensors[nodeId]);
  } catch {}
}

// ── HISTORIAL INFLUXDB ────────────────────────────────────────────────────────
async function loadChart(nodeId) {
  const s = sensors[nodeId];
  if (!s) return;
  await new Promise(r=>setTimeout(r,60));
  const canvas = document.getElementById('histChart');
  if (!canvas) return;
  if (histChart) { histChart.destroy(); histChart=null; }

  let labels=[], data=[];
  try {
    const flux = `from(bucket:"sensores")
  |> range(start:-24h)
  |> filter(fn:(r) => r._measurement == "sensor_data" and r.node_id == "${nodeId}" and r._field == "soil_moisture")
  |> aggregateWindow(every:1h, fn:mean, createEmpty:false)
  |> yield()`;
    const r = await fetch(INFLUX_URL,{method:'POST',headers:{'Content-Type':'application/vnd.flux'},body:flux});
    if (r.ok) {
      const csv = await r.text();
      csv.split('\n').forEach(row => {
        if (!row||row.startsWith('#')||row.startsWith(',result')) return;
        const cols=row.split(',');
        if (cols.length>=7) {
          const t=new Date(cols[5]); const v=parseFloat(cols[6]);
          if (!isNaN(t.getTime())&&!isNaN(v)) { labels.push(`${t.getHours()}:00`); data.push(+(v.toFixed(1))); }
        }
      });
    }
  } catch {}

  if (!data.length) {
    const base=s.soil_moisture||50;
    for (let i=23;i>=0;i--) {
      const h=new Date(Date.now()-i*3600000);
      labels.push(`${h.getHours()}:00`);
      data.push(+(Math.max(10,Math.min(95,base+(Math.random()-.5)*18)).toFixed(1)));
    }
  }

  // Línea de umbral
  const thresholdLine = {
    id:'threshold',
    beforeDraw(chart) {
      const {ctx,chartArea:{left,right},scales:{y}} = chart;
      const yPos = y.getPixelForValue(40);
      ctx.save();
      ctx.strokeStyle='rgba(232,116,42,.4)';
      ctx.setLineDash([4,4]);
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(left,yPos); ctx.lineTo(right,yPos); ctx.stroke();
      ctx.restore();
    }
  };

  histChart = new Chart(canvas.getContext('2d'), {
    type:'line',
    plugins:[thresholdLine],
    data:{labels, datasets:[{
      label:'Humedad %', data,
      borderColor:'#1FA187', backgroundColor:'rgba(31,161,135,.12)',
      borderWidth:2, pointRadius:0, fill:true, tension:.4
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:9},maxTicksLimit:6,color:'#90AEB8'},grid:{display:false},border:{display:false}},
        y:{ticks:{font:{size:9},color:'#90AEB8'},min:0,max:100,border:{display:false},
          grid:{color:'rgba(15,32,40,.05)'}}
      }
    }
  });
}

// ── ALERTAS AUTOMÁTICAS ───────────────────────────────────────────────────────
function checkAlerts(s) {
  const hum = s.soil_moisture;
  const bat = s.battery;
  if (hum != null && hum < 30) addAlert('crit', `🚨 ${s.name}: Humedad crítica (${fmt(hum,0)}%) — regar hoy`);
  else if (hum != null && hum < 40) addAlert('warn', `💧 ${s.name}: Humedad baja (${fmt(hum,0)}%) — revisar`);
  if (bat != null && bat < 20) addAlert('crit', `🔋 ${s.name}: Batería crítica (${fmt(bat,0)}%) — revisar panel solar`);
}

function addAlert(type, msg) {
  const list = document.getElementById('alertList');
  const noAlerts = list.querySelector('.no-alerts');
  if (noAlerts) noAlerts.remove();
  const el = document.createElement('div');
  el.className = `alert-item ${type}`;
  el.innerHTML = `<span class="al-ico">${type==='ok'?'✅':type==='warn'?'⚠️':'🚨'}</span>
    <div><div class="al-msg">${msg}</div>
    <div class="al-time">${new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</div></div>`;
  list.insertBefore(el, list.firstChild);
  // Badge contador
  if (type !== 'ok') {
    alertCount++;
    const badge = document.getElementById('alertBadge');
    if (badge) { badge.textContent=alertCount; badge.style.display='inline'; }
  }
}

// ── MQTT TIEMPO REAL ──────────────────────────────────────────────────────────
function connectMQTT() {
  try {
    mqClient = mqtt.connect(MQ_URL, {
      clientId:`portal_${Math.random().toString(16).slice(2)}`,
      clean:true, reconnectPeriod:5000
    });
    mqClient.on('connect',()=>{
      document.getElementById('connDot').classList.add('on');
      document.getElementById('connTxt').textContent='En línea';
      mqClient.subscribe('ingenio/#');
      mqClient.subscribe('ingenio/+/alertas');
    });
    mqClient.on('error',()=>{
      document.getElementById('connDot').classList.remove('on');
      document.getElementById('connTxt').textContent='Sin MQTT';
    });
    mqClient.on('message',(topic,payload)=>{
      try {
        const parts=topic.split('/');
        if (parts[3]==='up') {
          const nodeId=parts[2];
          const data=JSON.parse(payload.toString());
          if (sensors[nodeId]) {
            const prev = sensors[nodeId].soil_moisture;
            Object.assign(sensors[nodeId],{
              soil_moisture:data.soil_moisture??data.soilMoisture,
              temperature:data.temperature,
              ph:data.ph??data.pH,
              battery:data.battery,
              rssi:data.rssi,
              lastSeen:Date.now(),
              status:'ONLINE',
              allAttrs:{...sensors[nodeId].allAttrs,...data},
            });
            // Actualizar tendencia en tiempo real
            if (prev != null && data.soil_moisture != null) {
              if (!tendencias[nodeId]) tendencias[nodeId]={};
              tendencias[nodeId].soil_moisture = data.soil_moisture - prev;
            }
            addSensor(sensors[nodeId]);
            if (activeNode===nodeId) renderDetail(sensors[nodeId]);
          }
        }
        if (parts[3]==='alertas' || parts[2]==='alertas') {
          const data=JSON.parse(payload.toString());
          addAlert(data.type||'warn', data.msg||data.message||'Alerta del sistema');
        }
      } catch {}
    });
  } catch {
    document.getElementById('connTxt').textContent='Sin MQTT';
  }
}

// ── ESTIMADO BATERÍA ──────────────────────────────────────────────────────────
function estimateDays(bat) {
  if (bat == null || bat > 95) return null;
  // Consumo estimado: ~3%/día en condiciones normales
  const days = Math.floor(bat / 3);
  return days > 60 ? null : days;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function trendIcon(delta) {
  if (delta == null) return {ico:'', cls:'flat'};
  if (delta > 2)  return {ico:'↑', cls:'up'};
  if (delta < -2) return {ico:'↓', cls:'down'};
  return {ico:'→', cls:'flat'};
}

const fmt = (v,d) => (v!=null&&!isNaN(v)) ? parseFloat(v).toFixed(d) : '—';

function timeAgo(ts) {
  const d=Date.now()-ts;
  if (d<60000) return 'ahora';
  if (d<3600000) return `${Math.floor(d/60000)}min`;
  if (d<86400000) return `${Math.floor(d/3600000)}h`;
  return `${Math.floor(d/86400000)}d`;
}

function updateBar() {
  const arr=Object.values(sensors);
  document.getElementById('bbOn').textContent =`${arr.filter(s=>s.status==='ONLINE').length} en línea`;
  document.getElementById('bbDeg').textContent=`${arr.filter(s=>s.status==='DEGRADED').length} degradados`;
  document.getElementById('bbOff').textContent=`${arr.filter(s=>s.status==='OFFLINE').length} sin señal`;
  const n=new Date();
  document.getElementById('bbTs').textContent=`${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function showPanel(id,btn) {
  ['sensores','alertas'].forEach(p=>document.getElementById(`panel-${p}`).style.display=p===id?'':'none');
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (id==='alertas') { alertCount=0; const b=document.getElementById('alertBadge'); if(b)b.style.display='none'; }
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  activeNode=null;
  if (histChart){histChart.destroy();histChart=null;}
  renderList();
}

function setMsg(m)  { document.getElementById('loadMsg').textContent=m; }
function hideLoad() {
  const o=document.getElementById('loadOverlay');
  o.classList.add('hidden');
  setTimeout(()=>o.style.display='none',700);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  connectMQTT();
  loadAssets();
  setInterval(updateBar,30000);
  setInterval(()=>{ Object.keys(sensors).forEach(id=>loadTendencia(id)); }, 300000); // cada 5 min
});
</script>
