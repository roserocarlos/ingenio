events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Proxy OpenRemote — reescribe el Origin para que OR lo acepte
        location /api/or/ {
            proxy_pass http://openremote-manager:8080/;
            proxy_set_header Host ingenioplus.local;
            proxy_set_header Origin http://ingenioplus.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            if ($request_method = OPTIONS) { return 204; }
        }

        # Proxy Keycloak
        location /api/auth/ {
            proxy_pass http://openremote-keycloak:8080/auth/;
            proxy_set_header Host ingenioplus.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto http;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            if ($request_method = OPTIONS) { return 204; }
        }

        # Proxy InfluxDB CORS
        location /api/historial {
            proxy_pass http://influxdb:8086/api/v2/query;
            proxy_set_header Authorization "Token INFLUXDB_TOKEN_PLACEHOLDER";
            proxy_set_header Content-Type "application/vnd.flux";
            proxy_set_header Accept "application/csv";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            if ($request_method = OPTIONS) { return 204; }
        }
    }
}
