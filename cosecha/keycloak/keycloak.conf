# =============================================================================
# Ingenio+ — Keycloak configuración v10
# Modo local sin TLS — http://ingenioplus.local
# NOTA: el campo hostname es actualizado por setup_servidor.sh
#       con el hostname real del servidor ($(hostname).local)
# =============================================================================

# HTTP sin TLS
http-enabled=true

# No forzar HTTPS ni hostname estricto
hostname-strict=false
hostname-strict-https=false

# Proxy edge — Caddy termina la conexión en :80
proxy=edge

# Ruta relativa /auth — crítico para que el routing de Caddy funcione
http-relative-path=/auth

# Hostname del servidor — actualizado por setup_servidor.sh
hostname=ingenioplus.local
